<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeSim</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --border: #2a3145;
    --text: #e8eaf0;
    --muted: #6b7394;
    --accent: #5b7fff;
    --accent2: #a78bfa;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --orange: #fb923c;
    --pink: #f472b6;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px 0;
  }

  #app { width: 100%; max-width: 540px; padding: 0 12px; }

  /* Header */
  #header {
    text-align: center;
    padding: 20px 0 10px;
  }
  #header h1 {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #header .subtitle { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; margin-top: 2px; }

  /* Life bar */
  #life-bar-wrap { padding: 10px 0 6px; }
  #life-bar-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
  #life-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  #life-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease, background 0.4s ease;
  }

  /* Stats row */
  #stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin: 8px 0;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
  }
  .stat-box .stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-box .stat-val { font-family: var(--mono); font-size: 1.05rem; font-weight: 700; margin-top: 2px; }

  /* Character card */
  #char-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  #char-avatar {
    font-size: 2.4rem;
    background: var(--surface2);
    border-radius: 50%;
    width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }
  #char-info .name { font-weight: 700; font-size: 1rem; }
  #char-info .details { font-size: 0.72rem; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  #char-info .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .tag {
    font-size: 0.62rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--accent);
    font-family: var(--mono);
  }

  /* Log */
  #log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    max-height: 220px;
    overflow-y: auto;
    margin-bottom: 8px;
    scroll-behavior: smooth;
  }
  .log-entry {
    font-size: 0.76rem;
    padding: 4px 0;
    border-bottom: 1px solid var(--surface2);
    line-height: 1.5;
    display: flex;
    gap: 8px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-age { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); min-width: 30px; padding-top: 1px; }
  .log-text { flex: 1; }
  .log-good { color: var(--green); }
  .log-bad { color: var(--red); }
  .log-info { color: var(--accent); }
  .log-money { color: var(--yellow); }
  .log-special { color: var(--accent2); }

  /* Actions */
  #action-area { margin-bottom: 8px; }
  #action-title {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  #action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .action-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .action-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .action-btn .btn-icon { font-size: 1.1rem; }
  .action-btn.primary { border-color: var(--accent); background: rgba(91,127,255,0.08); }
  .action-btn.primary:hover { background: rgba(91,127,255,0.18); }
  .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .action-btn.full-width { grid-column: span 2; }

  /* Modals */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #modal-overlay.active { display: flex; }
  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    width: 100%; max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }
  #modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  #modal .modal-sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 14px; }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; color: var(--muted);
    font-size: 1.2rem; cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }
  #modal-options { display: flex; flex-direction: column; gap: 6px; }
  .modal-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    font-size: 0.8rem;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: border-color 0.15s;
    text-align: left;
    color: var(--text);
    width: 100%;
  }
  .modal-opt:hover { border-color: var(--accent); }
  .modal-opt .opt-icon { font-size: 1.2rem; flex-shrink: 0; padding-top: 1px; }
  .modal-opt .opt-label { font-weight: 600; font-size: 0.8rem; }
  .modal-opt .opt-desc { font-size: 0.68rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.82rem;
    padding: 8px 10px;
    margin-bottom: 8px;
    outline: none;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; display: block; }
  .modal-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 9px 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    transition: opacity 0.15s;
  }
  .modal-btn:hover { opacity: 0.85; }
  .modal-btn.danger { background: var(--red); }
  .modal-btn.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); margin-top: 6px; }
  .modal-section { margin-bottom: 14px; }
  .modal-section h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 8px; }
  .result-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 6px;
    border-left: 3px solid var(--accent);
  }
  .result-card.good { border-left-color: var(--green); }
  .result-card.bad { border-left-color: var(--red); }
  .result-card.special { border-left-color: var(--accent2); }
  .result-card .rc-title { font-weight: 700; font-size: 0.85rem; }
  .result-card .rc-body { font-size: 0.72rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }

  /* Net worth bar */
  .mini-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; }

  /* Relationship list */
  .rel-item {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--surface2);
    font-size: 0.78rem;
  }
  .rel-avatar { font-size: 1.3rem; }
  .rel-name { font-weight: 600; }
  .rel-type { font-size: 0.66rem; color: var(--muted); }
  .rel-hearts { color: var(--pink); font-size: 0.7rem; letter-spacing: 1px; }

  /* Property list */
  .prop-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 9px 11px;
    margin-bottom: 5px;
    font-size: 0.76rem;
  }
  .prop-item .prop-name { font-weight: 600; }
  .prop-item .prop-details { color: var(--muted); font-size: 0.68rem; margin-top: 2px; }

  /* Screen transitions */
  .screen { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* Start screen */
  #start-screen {
    text-align: center;
    padding: 30px 0;
  }
  #start-screen .big-emoji { font-size: 4rem; margin-bottom: 16px; display: block; }
  #start-screen h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
  #start-screen p { font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  #start-form label { font-size: 0.72rem; color: var(--muted); display: block; text-align: left; margin-bottom: 4px; }
  #start-form input, #start-form select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.85rem;
    padding: 10px 12px;
    margin-bottom: 12px;
    outline: none;
  }
  #start-form input:focus, #start-form select:focus { border-color: var(--accent); }
  #start-form select option { background: var(--surface2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .college-result-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--surface2); font-size: 0.76rem; }
  .college-result-row:last-child { border-bottom: none; }
  .admit-badge { font-size: 0.62rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .admit-yes { background: rgba(52,211,153,0.15); color: var(--green); }
  .admit-no { background: rgba(248,113,113,0.12); color: var(--red); }
  .admit-wait { background: rgba(251,191,36,0.12); color: var(--yellow); }
</style>
</head>

const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const randF = (a,b) => Math.random()*(b-a)+a;
const clamp = (v,min,max) => Math.min(max,Math.max(min,v));
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const fmt$ = n => n < 0 ? `-$${Math.abs(n).toLocaleString()}` : `$${n.toLocaleString()}`;

function calcCollegeScore(g) {
  const gpa = clamp(g.school_gpa||2.0, 0, 4.0);
  const sat = g.sat_score||800;
  const ecs = (g.extracurriculars||[]);
  // Sum up collegeBoost values from HS activities
  const ecScore = ecs.reduce((sum, id) => {
    const e = HS_EXTRACURRICULARS.find(x=>x.id===id);
    return sum + (e ? e.collegeBoost : 2);
  }, 0);
  const sport = g.varsity_athlete ? 10 : 0;
  const score = (gpa/4.0)*38 + (sat/1600)*38 + Math.min(ecScore, 22) + sport + rand(-4,4);
  return clamp(score, 0, 100);
}

// Merit + need-based financial aid estimate for a given college & applicant profile
function calcFinancialAid(college, applicantScore) {
  if(college.tuition === 0) return { meritPct:0, needPct:0, totalPct:0, netTuition:0 };
  const schoolBar = (1 - college.acceptance) * 100;
  const overqualification = clamp(applicantScore - schoolBar, 0, 100);
  const meritPct = clamp(overqualification * 1.3, 0, 70);
  const generousAid = college.tier === 'elite' || college.tier === 'high';
  const bankFactor = clamp((25000 - G.bank) / 25000, 0, 1);
  const needPct = generousAid ? bankFactor * 45 : bankFactor * 15;
  const totalPct = clamp(meritPct + needPct, 0, 90);
  const netTuition = Math.round(college.tuition * (1 - totalPct/100));
  return { meritPct: Math.round(meritPct), needPct: Math.round(needPct), totalPct: Math.round(totalPct), netTuition };
}

function applyForScholarships() {
  const gpa = G.school_gpa || 0;
  const ecCount = (G.extracurriculars||[]).length;
  const eligible = SCHOLARSHIPS.filter(s => {
    if(s.minGpa && gpa < s.minGpa) return false;
    if(s.requiresVarsity && !G.varsity_athlete) return false;
    if(s.minEcs && ecCount < s.minEcs) return false;
    if((G.scholarships_won||[]).includes(s.id)) return false;
    return true;
  });
  if(eligible.length === 0) { addLog("No new scholarships you qualify for right now — build your GPA & activities.", "info"); closeModal(); render(); return; }
  const rollCount = Math.min(eligible.length, rand(1,3));
  const candidates = [...eligible].sort(()=>Math.random()-0.5).slice(0, rollCount);
  let totalWon = 0;
  const won = [];
  candidates.forEach(s => {
    if(Math.random() < 0.45) {
      const amt = rand(s.amount[0], s.amount[1]);
      totalWon += amt;
      won.push(s);
      if(!G.scholarships_won) G.scholarships_won = [];
      G.scholarships_won.push(s.id);
    }
  });
  if(totalWon > 0) {
    const fromLoans = Math.min(G.college_student_loans, totalWon);
    G.college_student_loans -= fromLoans;
    const remainder = totalWon - fromLoans;
    if(remainder > 0) G.bank += remainder;
    addLog(`💰 Won ${won.map(w=>w.label).join(', ')}! ${fmt$(totalWon)} applied to your student loans.`, "special");
    G.happiness = clamp(G.happiness + rand(5,10), 5, 100);
  } else {
    addLog(`💰 Applied for ${candidates.length} scholarship${candidates.length>1?'s':''} — no luck this round.`, "info");
  }
  closeModal(); render();
}

    "Michigan":88,"Vanderbilt":86,"UCLA":87,"Georgetown":84,"NYU":82,
    "Mayo Clinic":96,"Washington University":91,"Emory":83,"Pittsburgh":80,
    "Harvard Law":99,"Yale Law":99,"Stanford Law":98,"Columbia Law":95,"NYU Law":93,
    "Chicago Law":96,"Georgetown Law":87,"Michigan Law":88,"Duke Law":87,"Virginia Law":86,
  };
  let gradPrestige = 0;
  if(G.grad_school) {
    const matchKey = Object.keys(gradPrestigeMap).find(k => G.grad_school.includes(k));
    gradPrestige = matchKey ? gradPrestigeMap[matchKey] : 55;

  return ugPrestige;
}

function getCollegeAdmissions(applicantScore) {
  const results = [];
  COLLEGES.forEach(c => {
    // acceptance probability based on score vs college selectivity
    const threshold = (1 - c.acceptance) * 100; // higher = harder
    const prob = clamp(1 - (threshold - applicantScore) / 40, 0.02, c.acceptance * 2);
    const admitted = Math.random() < prob;
    const waitlisted = !admitted && Math.random() < 0.15 && c.tier !== 'community';
    results.push({ ...c, status: admitted ? 'admitted' : waitlisted ? 'waitlist' : 'denied' });
  });
  return results;
}

function ageUp() {
  G.age++;
  G.study_sessions_this_year = 0; // reset fatigue counter each year
  
  // Natural stat drift
  G.health = clamp(G.health + rand(-3,2) + (G.health>80?-1:1), 1, 100);
  G.happiness = clamp(G.happiness + rand(-4,3), 5, 100);
  if(G.age > 30) G.looks = clamp(G.looks - rand(0,1), 0, 100);
  
  // Salary income
  if(G.job && G.salary>0) {
    const afterTax = Math.round(G.salary * 0.72);
    G.bank += afterTax;
    G.job_years++;
    G.job_performance = clamp(G.job_performance + rand(-5,8), 10, 100);
    if(G.ib_bank && G.ib_bonus > 0) {
      const bonusNet = Math.round(G.ib_bonus * 0.60);
      G.bank += bonusNet;
      // Vary bonus based on performance
      const perfMult = G.job_performance >= 80 ? 1.2 : G.job_performance >= 60 ? 1.0 : 0.7;
      G.ib_bonus = Math.round(G.ib_bonus * perfMult);
      addLog(`🏦 ${G.ib_bank}: Base ${fmt$(afterTax)} + Bonus ${fmt$(bonusNet)} (net after tax)`, "money");
      // Check for promotion by years
      const nextLevel = IB_LEVELS.find(l => G.job_years >= l.yearsMin && G.job_years < l.yearsMax);
      const curLevelIdx = G.ib_level || 0;
      const nextLevelIdx = IB_LEVELS.indexOf(nextLevel);
      if(nextLevel && nextLevelIdx > curLevelIdx && G.job_performance >= 55) {
        G.ib_level = nextLevelIdx;
        G.salary = Math.round(G.ib_base_salary * nextLevel.salaryBoost);
        G.ib_bonus = Math.round(G.ib_base_salary * 0.8 * nextLevel.bonusBoost);
        G.job = `${nextLevel.title}, ${G.ib_division ? IB_DIVISIONS[G.ib_division].label : ''} — ${G.ib_bank}`;
        G.happiness = clamp(G.happiness+12, 5, 100);
        addLog(`🎉 Promoted to ${nextLevel.title} at ${G.ib_bank}! Base: ${fmt$(G.salary)}/yr, Target bonus: ${fmt$(G.ib_bonus)}`, "special");
      }
    } else if(G.eng_firm) {
      const skillBonus = calcEngSkillSalaryBoost();
      const boostedSalary = Math.round(G.eng_base_salary * (1 + skillBonus));
      if(boostedSalary !== G.salary) G.salary = boostedSalary;
      addLog(`⚙️ ${G.eng_firm}: ${fmt$(afterTax)} after tax · Skill boost: +${Math.round(skillBonus*100)}%`, "money");
      // Promotion check
      const nextEL = ENG_LEVELS.find(l => G.job_years >= l.yearsMin && G.job_years < l.yearsMax);
      const curELIdx = G.eng_level || 0;
      const nextELIdx = ENG_LEVELS.indexOf(nextEL);
      if(nextEL && nextELIdx > curELIdx && G.job_performance >= 50) {
        const oldBoost = ENG_LEVELS[curELIdx]?.salaryBoost || 1;
        G.eng_level = nextELIdx;
        G.eng_base_salary = Math.round(G.eng_base_salary * (nextEL.salaryBoost / oldBoost));
        G.salary = Math.round(G.eng_base_salary * (1 + skillBonus));
        G.job = `${nextEL.title} — ${G.eng_firm}`;
        G.happiness = clamp(G.happiness+10, 5, 100);
        addLog(`🎉 Promoted to ${nextEL.title}! Salary: ${fmt$(G.salary)}/yr`, "special");
      }
    } else if(G.acad_firm) {
      const skillBonus = calcAcadSkillSalaryBoost();
      const boostedSalary = Math.round(G.acad_base_salary * (1 + skillBonus));
      if(boostedSalary !== G.salary) G.salary = boostedSalary;
      addLog(`🎓 ${G.acad_firm}: ${fmt$(afterTax)} after tax · Skill boost: +${Math.round(skillBonus*100)}%`, "money");
      // Tenure-track promotion check
      const nextAL = ACAD_LEVELS.find(l => G.job_years >= l.yearsMin && G.job_years < l.yearsMax);
      const curALIdx = G.acad_level || 0;
      const nextALIdx = ACAD_LEVELS.indexOf(nextAL);
      if(nextAL && nextALIdx > curALIdx && G.job_performance >= 50) {
        const oldBoost = ACAD_LEVELS[curALIdx]?.salaryBoost || 1;
        G.acad_level = nextALIdx;
        G.acad_base_salary = Math.round(G.acad_base_salary * (nextAL.salaryBoost / oldBoost));
        G.salary = Math.round(G.acad_base_salary * (1 + skillBonus));
        G.job = `${nextAL.title} — ${G.acad_firm}`;
        if(nextALIdx >= 1) G.acad_tenured = true;
        G.happiness = clamp(G.happiness+10, 5, 100);
        addLog(`🎉 Promoted to ${nextAL.title}${nextALIdx===1?' — TENURED!':''} Salary: ${fmt$(G.salary)}/yr`, "special");
      }
    } else if(G.residency_hospital && !G.attending_physician) {
      const specialty = MED_SPECIALTIES[G.residency_specialty];
      const level = RESIDENCY_LEVELS[Math.min(G.job_years, RESIDENCY_LEVELS.length-1)];
      addLog(`🏥 ${level.title} stipend: ${fmt$(afterTax)} after tax at ${G.residency_hospital}`, "money");
      if(specialty && G.job_years >= specialty.residencyYears) {
        const program = specialty.programs.find(p=>p.name===G.residency_hospital);
        const mult = program ? program.salaryMult : 1;
        const attendingSalary = Math.round(rand(specialty.attendingSalary[0], specialty.attendingSalary[1]) * mult);
        G.attending_physician = true;
        G.salary = attendingSalary;
        G.job = `Attending Physician, ${specialty.label} — ${G.residency_hospital}`;
        G.job_performance = clamp(G.job_performance+10,10,100);
        G.happiness = clamp(G.happiness+25,5,100);
        addLog(`🎉 Completed residency! Board-certified ${specialty.label} attending at ${G.residency_hospital}. Salary: ${fmt$(attendingSalary)}/yr`, "special");
      } else if(specialty) {
        G.job = `${RESIDENCY_LEVELS[Math.min(G.job_years, RESIDENCY_LEVELS.length-1)].title} — ${specialty.label}, ${G.residency_hospital}`;
        G.salary = 58000 + G.job_years*3500;
      }
    } else {
      addLog(`💵 Earned ${fmt$(afterTax)} after tax from ${G.job}`, "money");
    }
  }

  // Investment returns
  if(G.investments > 0) {
    const ret = Math.round(G.investments * randF(-0.12, 0.22));
    G.investments += ret;
    G.investment_return = ret;
    if(ret>0) addLog(`Investments gained ${fmt$(ret)} 📈`, "money");
    else addLog(`Investments lost ${fmt$(Math.abs(ret))} 📉`, "bad");
  }

  // Mortgage market rate drifts a bit each year (drives refinance opportunities)
  G.mortgage_market_rate = clamp(G.mortgage_market_rate + randF(-0.008, 0.008), 0.03, 0.11);

  // Property, vehicle & personal expenses — none of this applies until you're 18 and out on your own
  if(G.age >= 18) {
  // Property appreciation
  G.properties.forEach(p => {
    const appreciationRange = [-0.03 + (p.appreciationBonus||0), 0.09 + (p.appreciationBonus||0)];
    p.value = Math.round(p.value * (1 + randF(appreciationRange[0], appreciationRange[1])));
    if(p.renting) {
      const income = p.shortterm ? Math.round(p.rent_income * randF(0.6, 1.3)) : p.rent_income; // Airbnb income varies with demand
      G.bank += income * 12;
      addLog(`${p.shortterm?'Airbnb':'Rental'} income: ${fmt$(income*12)} from ${p.label}`, "money");
    }
    if(p.mortgage_balance > 0) {
      const payment = p.monthly_payment * 12;
      G.bank -= payment;
      p.mortgage_balance = Math.max(0, p.mortgage_balance - payment * 0.4);
    }
    if(p.insured) G.bank -= Math.round(p.value * 0.004); // annual premium
  });

  // Living situation: happiness from primary residence, or rent payments if renting
  if(G.primary_residence_idx >= 0 && G.properties[G.primary_residence_idx]) {
    const home = G.properties[G.primary_residence_idx];
    G.happiness = clamp(G.happiness + Math.round((home.happiness||5)/3), 5, 100);
    if(G.room_rented) {
      const roomIncome = Math.round(home.value * 0.0035);
      G.bank += roomIncome * 12;
      addLog(`🛏️ Roommate income from spare room: ${fmt$(roomIncome*12)}`, "money");
      if(Math.random() < 0.15) { G.happiness = clamp(G.happiness - rand(2,6), 5, 100); addLog("Living with a roommate has its friction points.", "info"); }
    }
  } else if(G.rental_home) {
    G.bank -= G.rental_home.monthlyRent * 12;
    G.happiness = clamp(G.happiness + 2, 5, 100);
  }

  // Random home event on an owned property — riskier neighborhoods get hit more often
  if(G.properties.length > 0 && Math.random() < 0.25) {
    const weights = G.properties.map(p => p.riskWeight || 1);
    const totalW = weights.reduce((a,b)=>a+b,0);
    let roll = Math.random() * totalW, idx = 0;
    for(; idx < weights.length; idx++) { if(roll < weights[idx]) break; roll -= weights[idx]; }
    const p = G.properties[idx];
    const ev = pick(HOME_EVENTS);
    let cost = rand(ev.cost[0], ev.cost[1]);
    if(p.insured && ev.type === "bad") cost = Math.round(cost * 0.2); // insurance absorbs most disaster costs
    G.bank -= cost;
    if(ev.valueBoost) p.value = Math.round(p.value * (1 + ev.valueBoost));
    if(ev.happiness && G.primary_residence_idx === idx) G.happiness = clamp(G.happiness + ev.happiness, 5, 100);
    addLog(ev.text(p) + (cost>0?` (${fmt$(cost)}${p.insured && ev.type==="bad"?', insurance covered the rest':''})`:''), ev.type);
  }

  // Foreclosure risk if deep in debt with a mortgaged property
  if(G.bank < -5000) {
    const mortgaged = G.properties.filter(p => p.mortgage_balance > 0);
    if(mortgaged.length > 0 && Math.random() < 0.3) {
      const lost = pick(mortgaged);
      const li = G.properties.indexOf(lost);
      addLog(`🏚️ Foreclosure! The bank repossessed ${lost.label} — you couldn't keep up with payments.`, "bad");
      G.happiness = clamp(G.happiness - 25, 5, 100);
      if(G.primary_residence_idx === li) G.primary_residence_idx = -1;
      else if(G.primary_residence_idx > li) G.primary_residence_idx--;
      G.properties.splice(li, 1);
      G.bank = Math.max(G.bank, -1000);
    }
  }

  // ── Vehicles: depreciation, insurance premiums, fuel, maintenance risk ──
  let totalFuelCost = 0;
  for(let i = G.vehicles.length - 1; i >= 0; i--) {
    const v = G.vehicles[i];
    v.age = (v.age||0) + 1;
    v.value = Math.max(500, Math.round(v.value * (1 - v.depreciation)));
    if(v.insurance_premium > 0) G.bank -= v.insurance_premium;
    if(v.fuel !== 'none') totalFuelCost += (FUEL_COST_BY_CATEGORY[v.category]||100) * 12;

    // Breakdown risk scales inversely with reliability; insurance/theft handled via VEHICLE_EVENTS
    const eventChance = clamp((100 - v.reliability) / 260, 0.03, 0.35);
    if(Math.random() < eventChance) {
      const ev = pick(VEHICLE_EVENTS);
      const tier = CAR_INSURANCE_TIERS.find(t=>t.id===v.insurance) || CAR_INSURANCE_TIERS[0];
      if(ev.kind === "theft") {
        if(tier.id === "full" || tier.id === "standard") {
          const reimburse = Math.round(v.value * tier.coverage);
          G.bank += reimburse;
          addLog(`${ev.text(v)} Insurance reimbursed ${fmt$(reimburse)}.`, "bad");
        } else {
          addLog(`${ev.text(v)} You had no real coverage — total loss.`, "bad");
        }
        G.happiness = clamp(G.happiness - 10, 5, 100);
        G.vehicles.splice(i, 1);
        continue;
      } else {
        let cost = rand(ev.cost[0], ev.cost[1]);
        const coveredAmt = Math.round(cost * tier.coverage);
        cost -= coveredAmt;
        G.bank -= cost;
        if(ev.healthLoss) G.health = clamp(G.health - rand(ev.healthLoss[0], ev.healthLoss[1]), 1, 100);
        if(ev.kind === "ticket" && Math.random() < 0.1 && !G.criminal_record) { G.criminal_record = true; addLog("The ticket escalated — now on your record.", "bad"); }
        addLog(`${ev.text(v)} Cost: ${fmt$(cost)}${coveredAmt>0?` (insurance covered ${fmt$(coveredAmt)})`:''}`, ev.type);
      }
    }
  }
  if(totalFuelCost > 0) {
    G.bank -= totalFuelCost;
    addLog(`⛽ Fuel & charging for the year: ${fmt$(totalFuelCost)}`, "money");
  }

  // ── Subscriptions, groceries, dining & utilities ──
  if(G.subscriptions.length > 0) {
    let subHappiness = 0, subHealth = 0, subSmarts = 0;
    const subCost = G.subscriptions.reduce((s,id) => {
      const sub = SUBSCRIPTIONS.find(x=>x.id===id);
      if(!sub) return s;
      subHappiness += sub.happiness||0; subHealth += sub.health||0; subSmarts += sub.smarts||0;
      return s + sub.cost;
    }, 0) * 12;
    G.bank -= subCost;
    G.happiness = clamp(G.happiness + subHappiness, 5, 100);
    G.health = clamp(G.health + subHealth, 1, 100);
    G.smarts = clamp(G.smarts + subSmarts, 1, 100);
    addLog(`📱 Subscriptions for the year: ${fmt$(subCost)}`, "money");
  }
  {
    const gt = GROCERY_TIERS.find(x=>x.id===G.grocery_tier) || GROCERY_TIERS[1];
    G.bank -= gt.monthlyCost * 12;
    G.happiness = clamp(G.happiness + gt.happiness, 5, 100);
    G.health = clamp(G.health + gt.health, 1, 100);
  }
  {
    const dt = DINING_TIERS.find(x=>x.id===G.dining_tier) || DINING_TIERS[1];
    if(dt.monthlyCost > 0) G.bank -= dt.monthlyCost * 12;
    G.happiness = clamp(G.happiness + dt.happiness, 5, 100);
  }
  {
    const ut = UTILITY_TIERS.find(x=>x.id===G.utility_tier) || UTILITY_TIERS[1];
    G.bank -= ut.monthlyCost * 12;
    G.happiness = clamp(G.happiness + ut.happiness, 5, 100);
  }

  // ── Debt servicing: student loans, personal/auto loans, credit cards ──
  let missedPayment = false;
  const bankBeforeDebt = G.bank;
  if(G.college_student_loans + G.grad_loans > 0) {
    G.grad_loans = Math.round(G.grad_loans * (1 + STUDENT_LOAN_RATE));
    G.college_student_loans = Math.round(G.college_student_loans * (1 + STUDENT_LOAN_RATE));
    const totalBal = G.grad_loans + G.college_student_loans;
    const annualPayment = Math.min(totalBal, Math.max(400, Math.round(totalBal * 0.12)));
    G.bank -= annualPayment;
    const principalPortion = Math.round(annualPayment * 0.55);
    if(G.grad_loans > 0) { const d = Math.min(principalPortion, G.grad_loans); G.grad_loans -= d; }
    else G.college_student_loans = Math.max(0, G.college_student_loans - principalPortion);
    addLog(`🎓 Student loan payment: ${fmt$(annualPayment)} (interest accrued at ${(STUDENT_LOAN_RATE*100).toFixed(1)}%)`, "money");
  }
  G.loans.forEach(l => {
    const annualPayment = l.monthly_payment * 12;
    G.bank -= annualPayment;
    l.balance = Math.max(0, l.balance - annualPayment * 0.45);
  });
  G.loans = G.loans.filter(l => l.balance > 1);
  G.credit_cards.forEach(c => {
    if(c.balance > 0) {
      c.balance = Math.round(c.balance * (1 + c.apr));
      const minPayment = Math.max(25, Math.round(c.balance * 0.03));
      const payment = Math.min(minPayment, c.balance);
      G.bank -= payment;
      c.balance = Math.max(0, c.balance - payment);
    }
  });
  if(G.heloc && G.heloc.balance > 0) {
    G.heloc.balance = Math.round(G.heloc.balance * (1 + G.heloc.rate));
    const minPayment = Math.max(50, Math.round(G.heloc.balance * 0.02));
    const payment = Math.min(minPayment, G.heloc.balance);
    G.bank -= payment;
    G.heloc.balance = Math.max(0, G.heloc.balance - payment);
  }
  if(G.bank < bankBeforeDebt - 200 && G.bank < -3000) missedPayment = true;

  // ── Collections / default: chronic inability to keep up with debt ──
  if(missedPayment) G.consecutive_missed_years = (G.consecutive_missed_years||0) + 1;
  else G.consecutive_missed_years = 0;
  if(G.consecutive_missed_years >= 2) {
    const eligible = [...G.credit_cards.filter(c=>c.balance>0), ...G.loans.filter(l=>l.type!=='auto'&&l.balance>0)];
    if(eligible.length > 0) {
      const worst = eligible.reduce((a,b)=> (b.rate||b.apr) > (a.rate||a.apr) ? b : a);
      const forgiven = Math.round(worst.balance * 0.4);
      worst.balance = Math.round(worst.balance * 0.6);
      G.bank += 0; // no cash benefit, just balance write-down
      if(worst.limit !== undefined) { const idx = G.credit_cards.indexOf(worst); if(idx>=0) G.credit_cards[idx].balance = worst.balance; }
      else { const idx = G.loans.indexOf(worst); if(idx>=0) G.loans[idx].balance = worst.balance; }
      G.in_collections = true;
      G.credit_score = clamp(G.credit_score - rand(80,120), 300, 850);
      G.consecutive_missed_years = 0;
      addLog(`📉 A debt went to collections. ${fmt$(forgiven)} was written off, but your credit score cratered.`, "bad");
    }
  }

  // ── Credit score update ──
  if(_totalDebt() > 0 || G.credit_cards.length > 0) {
    let delta = 0;
    if(missedPayment) delta -= rand(20,35);
    else delta += rand(2,6);
    G.credit_cards.forEach(c => {
      const util = c.limit>0 ? c.balance/c.limit : 0;
      if(util > 0.7) delta -= 6;
      else if(util > 0.4) delta -= 2;
      else if(util < 0.2) delta += 2;
    });
    const dti = G.salary > 0 ? _totalDebt() / G.salary : 0;
    if(dti > 0.6) delta -= 5;
    else if(dti < 0.2) delta += 1;
    G.credit_score = clamp(G.credit_score + delta, 300, 850);
    if(missedPayment) addLog("⚠️ Struggled to cover debt payments this year — your credit score took a hit.", "bad");
    if(G.in_collections && G.credit_score >= 580) { G.in_collections = false; addLog("📈 Your credit has recovered enough to shake off the collections mark.", "good"); }
  }

  // ── Unexpected life expenses ──
  if(Math.random() < 0.18) {
    const ev = pick(LIFE_EXPENSE_EVENTS);
    const cost = rand(ev.cost[0], ev.cost[1]);
    G.bank -= cost;
    addLog(`💸 ${ev.text} (${fmt$(cost)})`, "bad");
  }
  } // end age >= 18 gate

  // School phases
  handleSchool();

  // Random life event
  if(Math.random() < 0.45) {
    const ev = pick(RANDOM_EVENTS);
    if(ev.money) G.bank += ev.money;
    if(ev.health) G.health = clamp(G.health+ev.health,1,100);
    if(ev.happiness) G.happiness = clamp(G.happiness+ev.happiness,5,100);
    if(ev.smarts) G.smarts = clamp(G.smarts+ev.smarts,1,100);
    addLog(ev.text, ev.type==="money"?"money":ev.type==="bad"?"bad":"good");
  }

  // Aging health
  if(G.age > 60) G.health = clamp(G.health - rand(1,3), 1, 100);
  if(G.age > 75) G.health = clamp(G.health - rand(2,5), 1, 100);

  // Addictions
  G.addictions.forEach(a => {
    G.health = clamp(G.health-rand(2,5),1,100);
    G.bank -= rand(200,1000);
    G.happiness = clamp(G.happiness-rand(3,6),5,100);
  });

  // ── Family: age kids, trigger milestones, handle moving out ──
  for(let i = G.kids.length - 1; i >= 0; i--) {
    const k = G.kids[i];
    k.age++;
    if(k.age >= 18) {
      addLog(`🎓 ${k.name} turned 18 and moved out to start their own life. You can still keep in touch.`, "info");
      k.grown = true;
      G.grown_kids.push(k);
      G.kids.splice(i, 1);
      continue;
    }
    // passive bond drift
    k.bond = clamp(k.bond + rand(-3, 1), 0, 100);
    // milestone events
    const pool = k.age <= 12 ? KID_EVENTS_YOUNG : (k.age >= 13 && k.age <= 17 ? KID_EVENTS_TEEN : null);
    if(pool) {
      const eligible = pool.filter(e => k.age >= e.minAge && k.age <= e.maxAge);
      if(eligible.length > 0 && Math.random() < 0.35) {
        const ev = pick(eligible);
        ev.effect(k);
        addLog(ev.text(k), "info");
      }
    }
  }

  // ── Grown Children: still age, still reachable, occasional adult-life events ──
  G.grown_kids.forEach(k => {
    k.age++;
    k.bond = clamp(k.bond + rand(-2, 1), 0, 100);
  });
  if(G.grown_kids.length > 0 && Math.random() < 0.3) {
    const k = pick(G.grown_kids);
    const ev = pick(ADULT_KID_EVENTS);
    ev.effect(k);
    addLog(ev.text(k), ev.type);
  }

  // ── Partner: passive love decay if neglected, occasional friction ──
  if(G.partner) {
    G.partner.love = clamp(G.partner.love + rand(-5, 1), 0, 100);
    if(G.partner.love <= 10 && Math.random() < 0.4) {
      const wasMarried = G.married;
      addLog(`💔 ${G.partner.name} couldn't take the distance anymore and ended things.`, "bad");
      G.happiness = clamp(G.happiness - (wasMarried ? 20 : 10), 5, 100);
      if(wasMarried) { G.bank -= Math.round(G.bank * 0.3); G.married = false; }
      G.partner = null;
    }
  }

  // ── Friends: passive closeness decay, drifting apart, random social events ──
  for(let i = G.friends.length - 1; i >= 0; i--) {
    const f = G.friends[i];
    f.closeness = clamp(f.closeness + rand(-6, 1), 0, 100);
    if(f.closeness <= 5 && Math.random() < 0.5) {
      addLog(`👋 You and ${f.name} drifted apart.`, "info");
      G.friends.splice(i, 1);
    }
  }
  if(G.friends.length > 0 && Math.random() < 0.3) {
    const f = pick(G.friends);
    const ev = pick(FRIEND_EVENTS);
    const result = ev.effect(f);
    addLog(ev.isMoney ? `${ev.text(f)}${result}` : ev.text(f), ev.type);
  }

  // Death check
  checkDeath();

  // Net worth
  G.net_worth = G.bank + G.investments + G.properties.reduce((s,p)=>s+p.value,0) - G.grad_loans - G.college_student_loans - G.loans.reduce((s,l)=>s+l.balance,0) - G.credit_cards.reduce((s,c)=>s+c.balance,0) - (G.heloc ? G.heloc.balance : 0);

  render();
}

function handleSchool() {
  const a = G.age;
  // Elementary 6-11
  if(a>=6 && a<=11) {
    G.school_grade = "elementary";
    if(G.studying_hard) { G.smarts=clamp(G.smarts+rand(1,3),1,100); G.school_gpa=clamp(G.school_gpa+0.05,0,4); }
  }
  // Middle 12-14
  if(a>=12 && a<=14) {
    G.school_grade = "middle";
    if(G.studying_hard) { G.smarts=clamp(G.smarts+rand(1,4),1,100); G.school_gpa=clamp(G.school_gpa+0.08,0,4); }
  }
  // High School 15-18
  if(a>=15 && a<=18) {
    G.school_grade = "high_school";
    if(G.studying_hard) { G.smarts=clamp(G.smarts+rand(2,5),1,100); G.school_gpa=clamp(G.school_gpa+0.1,0,4); }
    G.extracurriculars.forEach(ec => {
      const e = EXTRACURRICULARS.find(x=>x.id===ec);
      if(e) { Object.entries(e.boost).forEach(([k,v])=>{ G[k]=clamp(G[k]+v,1,100); }); }
    });
    if(a===17 && !G.sat_score) {
      G.sat_score = clamp(Math.round(G.smarts*14 + rand(-100,100)), 400, 1600);
      addLog(`SAT Score: ${G.sat_score}`, "info");
    }
    if(a===18) {
      G.education = "hs";
      addLog("🎓 Graduated high school!", "special");
    }
  }
  // College
  if(G.in_college) {
    G.college_year++;
    G.school_gpa = clamp(G.school_gpa + (G.studying_hard?rand(0,10)/100:rand(-5,5)/100), 0, 4);
    G.smarts = clamp(G.smarts+rand(1,3),1,100);
    const tuition = G.college_net_tuition !== undefined && G.college_net_tuition !== null ? G.college_net_tuition : 25000;
    const payFromBank = Math.min(Math.max(G.bank,0), tuition);
    G.bank -= payFromBank;
    const borrowed = tuition - payFromBank;
    if(borrowed > 0) G.college_student_loans += borrowed;
    addLog(`💰 Tuition this year: ${fmt$(tuition)}${borrowed>0?` (${fmt$(payFromBank)} paid, ${fmt$(borrowed)} borrowed)`:tuition>0?' (paid in full from savings)':''}`, "money");
    // Apply college EC boosts each year
    (G.extracurriculars||[]).forEach(id => {
      const e = COLLEGE_EXTRACURRICULARS.find(x=>x.id===id);
      if(e) Object.entries(e.boost).forEach(([k,v]) => { if(G[k]!==undefined) G[k]=clamp(G[k]+v,1,100); });
    });
    if(G.college_year >= 4) {
      G.in_college = false;
      G.education = "bachelor";
      addLog(`🎓 Graduated from ${G.college.name} with a ${G.major} degree!`, "special");
      G.happiness = clamp(G.happiness+15,5,100);
    } else {
      addLog(`📚 Year ${G.college_year} at ${G.college.name}`, "info");
    }
  }
  // Grad school
  if(G.in_grad_school) {
    G.grad_year++;
    const prog = GRAD_PROGRAMS.find(p=>p.id===G.grad_program);
    if(prog) {
      const cost = prog.cost || 0;
      G.bank -= cost;
      if(cost>0) G.grad_loans += cost;
      if(prog.stipend) G.bank += prog.stipend;
      G.smarts = clamp(G.smarts+rand(2,5),1,100);
      if(G.grad_year >= prog.years) {
        G.in_grad_school = false;
        G.education = prog.degree;
        addLog(`🎓 Completed ${prog.label} from ${G.grad_school}!`, "special");
        G.happiness = clamp(G.happiness+20,5,100);
        G.smarts = clamp(G.smarts+10,1,100);
      } else {
        addLog(`Year ${G.grad_year} of ${prog.label}`, "info");
      }
    }
  }
}

function checkDeath() {
  if(G.health <= 0) { die("Natural causes"); return; }
  if(G.age > 80 && Math.random() < (G.age-80)*0.02) { die("Old age"); return; }
  if(G.age > 90 && Math.random() < 0.3) { die("Old age"); return; }
  if(G.health < 20 && Math.random() < 0.05) { die("Health complications"); return; }
}

function die(cause) {
  G.alive = false;
  G.cause_of_death = cause;
  addLog(`💀 You passed away at age ${G.age} due to ${cause}.`, "bad");
  if(G.subscriptions && G.subscriptions.includes("life_insurance")) {
    const payout = rand(150000, 500000);
    G.life_insurance_payout = payout;
    addLog(`🕊️ Your life insurance policy paid out ${fmt$(payout)} to your family.`, "special");
  }
  render();
}

function render() {
  const root = document.getElementById('game-root');
  if(!G) { renderStart(); return; }
  root.innerHTML = '';
  root.className = 'screen';

  if(!G.alive) { renderDead(root); return; }

  // Life bar
  const lifePct = Math.min(G.age/100*100,100);
  const barColor = lifePct<33?'var(--green)':lifePct<66?'var(--yellow)':'var(--red)';
  root.innerHTML += `
    <div id="life-bar-wrap">
      <div id="life-bar-label"><span>Age ${G.age}</span><span>${G.city}, ${G.country}</span><span>${G.born_year + G.age}</span></div>
      <div id="life-bar"><div id="life-bar-fill" style="width:${lifePct}%;background:${barColor}"></div></div>

  `;

  // Stats
  root.innerHTML += `

      <div class="stat-box"><div class="stat-label">Health</div><div class="stat-val" style="color:${statColor(G.health)}">❤️${G.health}</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${G.health}%;background:${statColor(G.health)}"></div></div></div>
      <div class="stat-box"><div class="stat-label">Smarts</div><div class="stat-val" style="color:${statColor(G.smarts)}">🧠${G.smarts}</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${G.smarts}%;background:${statColor(G.smarts)}"></div></div></div>
      <div class="stat-box"><div class="stat-label">Happy</div><div class="stat-val" style="color:${statColor(G.happiness)}">😊${G.happiness}</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${G.happiness}%;background:${statColor(G.happiness)}"></div></div></div>
      <div class="stat-box"><div class="stat-label">Looks</div><div class="stat-val" style="color:${statColor(G.looks)}">✨${G.looks}</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${G.looks}%;background:${statColor(G.looks)}"></div></div></div>
    </div>
  `;

  // Char card
  const emoji = G.gender==='Male'?'👦':'👧';
  const tags = [...G.traits];
  if(G.education!=='none') tags.push(eduLabel(G.education));
  if(G.job) tags.push(G.job);
  if(G.married) tags.push('Married');
  if(G.college) tags.push(G.college.name.split(' ')[0]);
  root.innerHTML += `
    <div id="char-card">
      <div id="char-avatar">${emoji}</div>
      <div id="char-info">
        <div class="name">${G.name}</div>
        <div class="details">
          📍 ${G.city} · 💰 ${fmt$(G.net_worth)} net worth<br>
          🎓 ${eduLabel(G.education)} · ${G.job?'💼 '+G.job:'Unemployed'}
          ${G.major?`· ${G.major}`:''}
        </div>
        <div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `;

  // Log
  root.innerHTML += `<div id="log">${G.log.slice(0,30).map(l=>`<div class="log-entry"><span class="log-age">${l.age}</span><span class="log-text log-${l.type}">${l.text}</span></div>`).join('')||'<div style="color:var(--muted);font-size:0.75rem;text-align:center;padding:20px">Your story begins...</div>'}</div>`;

function toggleStudy() {
  G.studying_hard = !G.studying_hard;
  addLog(G.studying_hard ? "📖 Committed to studying hard — GPA improves each year you age up" : "😌 Eased off studying", G.studying_hard?"good":"info");
  closeModal();

}

function studySession() {
  // Grindable but with fatigue: each session this year gives slightly less GPA
  // tracked via study_sessions_this_year counter, reset on ageUp
  G.study_sessions_this_year = (G.study_sessions_this_year||0) + 1;
  const n = G.study_sessions_this_year;

  // Fatigue kicks in: first 3 sessions full effect, then diminishing
  const fatigueMult = n <= 3 ? 1.0 : n <= 6 ? 0.65 : n <= 10 ? 0.35 : 0.12;

  const isCollege = G.in_college;
  const grade = G.school_grade;

  // Base GPA gain per session
  const baseGpa = isCollege ? 0.08 : grade==="high_school" ? 0.07 : grade==="middle" ? 0.05 : 0.03;
  const baseSmarts = isCollege ? rand(1,4) : grade==="high_school" ? rand(1,3) : rand(0,2);

  const gBoost = parseFloat((baseGpa * fatigueMult).toFixed(3));
  const sBoost = Math.max(0, Math.round(baseSmarts * fatigueMult));

  // GPA hard-capped by smarts: higher smarts = higher ceiling
  const smartsCap = 1.5 + (G.smarts / 100) * 2.5; // range: 1.5 (smarts=0) → 4.0 (smarts=100)
  G.school_gpa = clamp(G.school_gpa + gBoost, 0, Math.min(4.0, smartsCap));
  G.smarts = clamp(G.smarts + sBoost, 1, 100);

  // Happiness drain from over-studying
  if(n > 4) G.happiness = clamp(G.happiness - rand(1,3), 5, 100);
  if(n > 8) G.health = clamp(G.health - rand(1,2), 1, 100);

  const fatigueNote = n <= 3 ? '' : n <= 6 ? ' (fatigued — diminishing returns)' : n <= 10 ? ' (very fatigued)' : ' (burnout — minimal gains)';
  addLog(`📖 Study session #${n}${fatigueNote} · GPA → ${G.school_gpa.toFixed(2)}${sBoost>0?` · Smarts +${sBoost}`:''}`, "good");
  closeModal(); render();
}

function takeSAT() {
  // Diminishing returns: each retake gives less improvement
  G.sat_retakes = (G.sat_retakes||0) + 1;
  const diminish = Math.max(0.2, 1 - (G.sat_retakes - 1) * 0.25);
  const base = G.studying_hard ? rand(30,90) : rand(-30,40);
  const bonus = Math.round(base * diminish);
  const old = G.sat_score||800;
  // SAT is capped by smarts ceiling
  const smartsCap = clamp(Math.round(G.smarts * 15.5), 400, 1600);
  G.sat_score = clamp(Math.round(old + bonus + rand(-20,20)), 400, smartsCap);
  G.bank -= 55;
  const retakeNote = G.sat_retakes > 2 ? ` (diminishing returns — attempt #${G.sat_retakes})` : '';
  addLog(`📝 SAT retake: ${G.sat_score} (was ${old})${retakeNote}`, G.sat_score>old?"good":"bad");
  closeModal();
  render();
}

function takeMCAT() {
  G.mcat_attempts = (G.mcat_attempts||0) + 1;
  const diminish = Math.max(0.2, 1 - (G.mcat_attempts-1) * 0.25);
  const base = G.studying_hard ? rand(4,16) : rand(-6,8);
  const bonus = Math.round(base * diminish);
  const old = G.mcat_score || 494;
  const smartsCap = clamp(Math.round(472 + G.smarts * 0.56), 472, 528);
  G.mcat_score = clamp(Math.round(old + bonus + rand(-2,2)), 472, smartsCap);
  G.bank -= 340;
  const retakeNote = G.mcat_attempts > 1 ? ` (attempt #${G.mcat_attempts}, diminishing returns)` : '';
  addLog(`🧬 MCAT: ${G.mcat_score}/528${retakeNote}`, G.mcat_score>old?"good":"info");
  closeModal();
  render();
}

function showExtracurriculars() {
  const isCollege = G.in_college;
  const ecList = isCollege ? COLLEGE_EXTRACURRICULARS : HS_EXTRACURRICULARS;
  const active = G.extracurriculars || [];
  const maxAllowed = isCollege ? 6 : 5;

  const opts = ecList.map(e => {
    const has = active.includes(e.id);
    const full = !has && active.length >= maxAllowed;
    const boostText = Object.entries(e.boost).map(([k,v])=>`+${v} ${k}`).join(', ');
    const bonusLabel = isCollege
      ? `Career signal: +${e.careerBoost}`
      : `College app boost: +${e.collegeBoost}`;
    return `<button class="modal-opt" ${full?'style="opacity:0.4" disabled':''} onclick="${full?'':` toggleEC('${e.id}')`}">
      <span class="opt-icon">${e.emoji}</span>
      <div>
        <div class="opt-label">${e.label}${has?' ✓':''}</div>
        <div class="opt-desc">${e.desc}<br><span style="color:var(--green)">${boostText}</span> · <span style="color:var(--accent2)">${bonusLabel}</span></div>
      </div>
    </button>`;
  }).join('');

  const title = isCollege ? '🏫 College Activities' : '🏅 High School Extracurriculars';
  openModal(`
    <h2>${title}</h2>
    <div class="modal-sub">Active: ${active.length}/${maxAllowed} max · ${isCollege ? 'Boosts career & grad school chances' : 'Boosts college application strength'}</div>
    <div id="modal-options">${opts}</div>
  `);
}

function toggleEC(id) {
  const allECs = [...HS_EXTRACURRICULARS, ...COLLEGE_EXTRACURRICULARS];
  const ec = allECs.find(e => e.id === id);
  if (!ec) return;

  if (G.extracurriculars.includes(id)) {
    G.extracurriculars = G.extracurriculars.filter(e => e !== id);
    addLog(`Left ${ec.label}`, "info");
  } else {
    G.extracurriculars.push(id);
    addLog(`Joined ${ec.label}! ${Object.entries(ec.boost).map(([k,v])=>`+${v} ${k}`).join(', ')}`, "good");
    if (id === 'hs_varsity_sports') G.varsity_athlete = true;
    // Apply immediate small boost on join
    Object.entries(ec.boost).forEach(([k,v]) => { if(G[k]!==undefined) G[k] = clamp(G[k]+1, 1, 100); });
  }
  showExtracurriculars();
}

              ? `Sticker: <span style="text-decoration:line-through">${fmt$(c.tuition)}</span>/yr → <b style="color:var(--green)">${fmt$(aid.netTuition)}/yr</b> after aid (${aid.totalPct}% off: ${aid.meritPct}% merit + ${aid.needPct}% need)`

  }).join('');
  openModal(`<h2>🏛️ Graduate School</h2><div class="modal-sub">Current Smarts: ${G.smarts} · Major: ${G.major||'None'}</div><div id="modal-options">${opts}</div>`);

function applyGrad(programId) {
  const prog = GRAD_PROGRAMS.find(p=>p.id===programId);
  if(programId === 'med' && (!G.mcat_score || G.mcat_score < 494)) {
    addLog(`❌ MCAT score too low (${G.mcat_score||'not taken'}) — need 494+ to apply. Take the MCAT during college.`, "bad");
    closeModal(); render(); return;
  }
  const schools = ["Harvard","Yale","Stanford","Columbia","Duke","Northwestern","Georgetown","Penn","Michigan","NYU"];
  let admitChance = G.smarts/100*0.8;
  if(programId === 'med') {
    const mcatNorm = clamp((G.mcat_score-472)/56, 0, 1);
    admitChance = clamp(mcatNorm*0.6 + (G.smarts/100)*0.25 + (G.school_gpa/4)*0.15, 0, 0.95);
  }
  const admitted = Math.random() < admitChance;
  const school = pick(schools) + (prog.id==='law'?' Law School':prog.id==='med'?' Medical School':prog.id==='dental'?' Dental School':prog.id==='mba'?' Business School':prog.id==='pharmacy'?' College of Pharmacy':' Graduate School');

  if(admitted) {
    G.in_grad_school = true;
    G.grad_program = programId;
    G.grad_school = school;
    G.grad_year = 0;
    addLog(`🎓 Accepted to ${school} — ${prog.label}!`, "special");
    closeModal();
    render();
  } else {
    addLog(`❌ Denied from grad school programs. Keep studying!`, "bad");
    G.smarts = clamp(G.smarts+2,1,100);
    closeModal();
    render();
  }
}

function takeStep1() {
  if(G.step1_score) { addLog("Already passed Step 1", "info"); closeModal(); render(); return; }
  if((G.grad_year||0) < 2) { addLog("Complete 2 years of med school first", "bad"); closeModal(); render(); return; }
  const base = 194 + Math.round(G.smarts*0.7) + Math.round(((G.mcat_score||494)-472)*0.35);
  const score = clamp(base + rand(-12,18), 194, 280);
  G.step1_score = score;
  G.smarts = clamp(G.smarts + rand(1,3), 1, 100);
  addLog(`📘 USMLE Step 1: ${score} — ${score>=214?'Pass':'Marginal'}`, score>=214?"good":"bad");
  closeModal(); render();
}

function takeStep2CK() {
  if(G.step2ck_score) { addLog("Already taken Step 2 CK", "info"); closeModal(); render(); return; }
  if(!G.step1_score || (G.grad_year||0) < 3) { addLog("Requires Step 1 pass and 3rd-year clinical rotations", "bad"); closeModal(); render(); return; }
  const base = (G.step1_score||220) + rand(-6,22) + Math.round(G.smarts*0.15);
  const score = clamp(base, 194, 285);
  G.step2ck_score = score;
  addLog(`📗 USMLE Step 2 CK: ${score} — the key number residency programs will see`, "good");
  closeModal(); render();
}

function takeStep3() {
  if(G.step3_score) { addLog("Already passed Step 3", "info"); closeModal(); render(); return; }
  if(!G.residency_hospital) { addLog("Step 3 is taken during intern year of residency", "bad"); closeModal(); render(); return; }
  const base = (G.step2ck_score||225) + rand(-5,15);
  const score = clamp(base, 194, 280);
  G.step3_score = score;
  addLog(`📙 USMLE Step 3: ${score} — fully licensed to practice independently!`, "special");
  closeModal(); render();
}

function medApplicantScore() {
  const mcatNorm = clamp(((G.mcat_score||472)-472)/56, 0, 1);
  const step2Norm = clamp(((G.step2ck_score||194)-194)/(285-194), 0, 1);
  const prestige = getPrestigeScore();
  const prestigeNorm = clamp(prestige/100, 0, 1);
  return Math.round((step2Norm*0.55 + mcatNorm*0.15 + prestigeNorm*0.30) * 100);
}

function medApplicantTierLabel(score) {
  if(score>=80) return { label:'Highly Competitive Applicant', color:'var(--yellow)' };
  if(score>=60) return { label:'Strong Applicant', color:'var(--accent2)' };
  if(score>=40) return { label:'Solid Applicant', color:'var(--accent)' };
  if(score>=20) return { label:'Below Average Applicant', color:'var(--muted)' };
  return { label:'Weak Applicant', color:'var(--red)' };
}

function medStartInterview(specialtyKey) {
  G.med_target_specialty = specialtyKey;
  G.med_interview_step = 0;
  G.med_interview_score = 0;
  medRunInterview();
}

function medRunInterview() {
  const specialty = MED_SPECIALTIES[G.med_target_specialty];
  const qs = MED_INTERVIEW_QS[G.med_target_specialty];
  const step = G.med_interview_step;
  if(step >= qs.length) { medFinishInterview(); return; }
  const q = qs[step];
  const score = medApplicantScore();
  openModal(`
    <h2>${specialty.emoji} ${specialty.label} Interview</h2>
    <div class="modal-sub">Question ${step+1} of ${qs.length} · Score: ${G.med_interview_score} pts · Applicant Score: ${score}/100</div>
    <div style="background:var(--surface2);border-left:3px solid var(--green);border-radius:8px;padding:12px;margin-bottom:12px;font-size:0.82rem;line-height:1.55">${q.q}</div>
    <div id="modal-options">
      ${q.opts.map((o,i)=>`<button class="modal-opt" onclick="medAnswerQ(${i})">
        <span class="opt-icon">${i===0?'🩺':i===1?'🤔':'😬'}</span>
        <div><div class="opt-label" style="font-size:0.76rem;font-weight:500;line-height:1.4">${o.t}</div></div>
      </button>`).join('')}
    </div>
  `);
}

function medAnswerQ(idx) {
  const qs = MED_INTERVIEW_QS[G.med_target_specialty];
  const q = qs[G.med_interview_step];
  G.med_interview_score += q.opts[idx].pts;
  G.med_interview_step++;
  medRunInterview();
}

function medFinishInterview() {
  const specialty = MED_SPECIALTIES[G.med_target_specialty];
  const qs = MED_INTERVIEW_QS[G.med_target_specialty];
  const maxScore = qs.reduce((s,q)=>s+Math.max(...q.opts.map(o=>o.pts)),0);
  const rawPct = G.med_interview_score / maxScore;
  const score = medApplicantScore();
  const eligible = specialty.programs.filter(p => score >= p.minPrestige && (G.step2ck_score||0) >= p.minStep);

  const combinedScore = rawPct*0.55 + (score/100)*0.30 + Math.random()*0.15;

  let placed = null;
  if(combinedScore >= 0.80 && eligible.length>=1) placed = eligible[0];
  else if(combinedScore >= 0.62 && eligible.length>=2) placed = eligible[1];
  else if(combinedScore >= 0.45 && eligible.length>=3) placed = eligible[2];
  else if(combinedScore >= 0.30 && eligible.length>=1) placed = eligible[eligible.length-1];

  const pts = G.med_interview_score;
  const specKey = Object.keys(MED_SPECIALTIES).find(k=>MED_SPECIALTIES[k]===specialty);
  G.med_target_specialty = null; G.med_interview_step = 0; G.med_interview_score = 0;

  if(placed) {
    G.residency_specialty = specKey;
    G.residency_hospital = placed.name;
    G.attending_physician = false;
    G.job = `PGY-1 (Intern) — ${specialty.label}, ${placed.name}`;
    G.salary = 58000;
    G.job_years = 0;
    G.job_performance = clamp(Math.round(rawPct*70+30),30,90);
    G.consulting_firm=null; G.consulting_branch=null; G.ib_bank=null; G.ib_division=null; G.eng_firm=null; G.eng_sector=null; G.acad_firm=null; G.acad_field=null;
    G.happiness = clamp(G.happiness+20,5,100);
    addLog(`🎉 MATCHED! ${specialty.label} residency at ${placed.name} (${placed.tier})`, "special");
    openModal(`
      <h2>🎉 Match Day!</h2>
      <div class="result-card special">
        <div class="rc-title">${placed.emoji} ${placed.name} — ${placed.tier}</div>
        <div class="rc-body">
          ${specialty.label} · ${specialty.residencyYears}-year residency<br>
          PGY-1 stipend: <b>${fmt$(58000)}/yr</b><br>
          Attending pay upon completion: <b>${fmt$(specialty.attendingSalary[0])}–${fmt$(specialty.attendingSalary[1])}/yr</b>
        </div>
      </div>
      <div class="result-card">
        <div class="rc-title">Your scorecard</div>
        <div class="rc-body">Interview: ${pts}/${maxScore} · Applicant score: ${score}/100<br>Step 2 CK: ${G.step2ck_score||'N/A'}</div>
      </div>
      <button class="modal-btn" onclick="closeModal();render()">Accept Match 🩺</button>
    `);
  } else {
    addLog(`❌ Didn't match into ${specialty.label} this cycle. Applicant score: ${score}/100`, "bad");
    openModal(`
      <h2>❌ No Match</h2>
      <div class="result-card bad">
        <div class="rc-title">Unmatched — ${specialty.label}</div>
        <div class="rc-body">
          Interview: ${pts}/${maxScore} pts · Applicant score: ${score}/100<br>
          ${score < 40 ? '⚠️ Step 2 CK is the biggest lever — it drives most of your competitiveness.' :
            rawPct < 0.5 ? '💡 Brush up on your clinical reasoning for interviews.' :
            '💡 Close — consider a less competitive specialty or try again next cycle.'}
        </div>
      </div>
      <button class="modal-btn secondary" onclick="closeModal();render()">Close</button>
    `);
  }
}

  G.med_patients_treated = (G.med_patients_treated||0)+rand(8,25);

  const available = CAREERS.filter(c => {
    const need = eduRank[c.minEdu]||0;
    return myRank >= need && G.smarts>=(c.req.smarts||0) && G.health>=(c.req.health||0) && G.looks>=(c.req.looks||0);
  });
  const locked = CAREERS.filter(c => !available.includes(c));

  html += `<div class="modal-sub">${available.length} jobs available · ${locked.length} locked by education/stats · Browse by industry:</div><div id="modal-options">`;
  industries.forEach(ind => {
    const avail = available.filter(c=>c.industry===ind);
    const total = CAREERS.filter(c=>c.industry===ind).length;
    if(avail.length===0) {
      html += `<button class="modal-opt" style="opacity:0.35" disabled>
        <span class="opt-icon">🔒</span>
        <div><div class="opt-label">${ind}</div><div class="opt-desc">${total} jobs — need more education or stats</div></div>
      </button>`;
    } else {
      const topSalary = Math.max(...avail.map(c=>c.salary[1]));
      html += `<button class="modal-opt" onclick="showCareerIndustry('${ind}')">
        <span class="opt-icon">${avail[0].emoji}</span>
        <div><div class="opt-label">${ind}</div><div class="opt-desc">${avail.length}/${total} jobs available · up to ${fmt$(topSalary)}/yr</div></div>
      </button>`;
    }
  });
  html += `</div>`;
  openModal(html);
}

function showCareerIndustry(industry) {
  const eduRank = {none:0,hs:1,bachelor:2,masters:3,jd:3,md:4,dds:4,mba:3,pharmd:4,phd:4};
  const myRank = eduRank[G.education]||0;
  const jobs = CAREERS.filter(c=>c.industry===industry);
  const available = jobs.filter(c => {
    const need = eduRank[c.minEdu]||0;
    return myRank>=need && G.smarts>=(c.req.smarts||0) && G.health>=(c.req.health||0) && G.looks>=(c.req.looks||0);
  });
  const lockedJobs = jobs.filter(c=>!available.includes(c));

  let html = `<h2>${available[0]?.emoji||'💼'} ${industry}</h2>
    <div class="modal-sub">${available.length} available · ${lockedJobs.length} locked</div>
    <div id="modal-options">`;
  available.forEach(c => {
    html += `<button class="modal-opt" onclick="takeJob('${c.id}')">
      <span class="opt-icon">${c.emoji}</span>
      <div>
        <div class="opt-label">${c.label}</div>
        <div class="opt-desc">${fmt$(c.salary[0])}–${fmt$(c.salary[1])}/yr · Req: ${Object.entries(c.req).map(([k,v])=>`${k} ${v}+`).join(', ')||'none'}</div>
      </div>
    </button>`;
  });
  if(lockedJobs.length > 0) {
    html += `<div style="font-size:0.68rem;color:var(--muted);padding:6px 4px;margin-top:4px">🔒 Locked (${lockedJobs.length}):</div>`;
    lockedJobs.slice(0,4).forEach(c => {
      const need = [
        (eduRank[c.minEdu]||0) > (eduRank[G.education]||0) ? `needs ${c.minEdu}` : null,
        c.req.smarts && G.smarts < c.req.smarts ? `smarts ${c.req.smarts}+` : null,
        c.req.health && G.health < c.req.health ? `health ${c.req.health}+` : null,
        c.req.looks && G.looks < c.req.looks ? `looks ${c.req.looks}+` : null,
      ].filter(Boolean).join(', ');
      html += `<button class="modal-opt" style="opacity:0.35" disabled>
        <span class="opt-icon">${c.emoji}</span>
        <div><div class="opt-label">${c.label}</div><div class="opt-desc">Requires: ${need}</div></div>
      </button>`;
    });
  }
  html += `</div><button class="modal-btn secondary" onclick="showCareers()">← All Industries</button>`;
  openModal(html);
}

function takeJob(id) {
  const c = CAREERS.find(x=>x.id===id);
  if(!c) return;
  G.job = c.label;
  G.job_id = id;
  G.consulting_firm = null;
  G.consulting_branch = null;
  G.ib_bank = null; G.ib_division = null; G.eng_firm = null; G.eng_sector = null; G.acad_firm = null; G.acad_field = null;
  G.salary = rand(c.salary[0], c.salary[1]);
  G.job_years = 0;
  G.job_performance = 50;
  addLog(`💼 Started as ${c.label} — ${fmt$(G.salary)}/yr!`, "good");
  G.happiness = clamp(G.happiness+8,5,100);
  closeModal(); render();
}

function seekPromotion() {
  if(G.job_performance >= 80) {
    const bump = Math.round(G.salary * randF(0.20, 0.40));
    G.salary += bump;
    G.job_performance = clamp(G.job_performance - 10, 30, 100);
    addLog(`🎉 Promoted! Salary +${fmt$(bump)}/yr → ${fmt$(G.salary)}`, "special");
    G.happiness = clamp(G.happiness+12,5,100);
  } else {
    addLog(`❌ Promotion denied — need 80+ performance (currently ${G.job_performance})`, "bad");
  }
  closeModal(); render();
}

function workHarder() {
  G.job_performance = clamp(G.job_performance+rand(5,15),0,100);
  G.happiness = clamp(G.happiness-3,5,100);
  G.health = clamp(G.health-2,1,100);
  addLog(`💪 Worked extra hard at ${G.job}. Performance: ${G.job_performance}`, "good");
  closeModal(); render();
}

function askRaise() {
  if(G.job_performance >= 70) {
    const raise = Math.round(G.salary * randF(0.04,0.12));
    G.salary += raise;
    addLog(`💵 Got a raise! +${fmt$(raise)}/yr → ${fmt$(G.salary)}`, "money");
  } else {
    addLog(`❌ Raise denied. Performance (${G.job_performance}) needs to be 70+`, "bad");
  }
  closeModal(); render();
}

function quitJob() {
  addLog(`🚪 Quit job as ${G.job}`, "info");
  G.job = null; G.salary = 0; G.consulting_firm = null; G.consulting_branch = null;
  G.happiness = clamp(G.happiness-5,5,100);
  closeModal(); render();
}

          ${!isPrimary && !p.flip && !p.renting ?`<button onclick="toggleVacationHome(${i})" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:0.66rem;padding:3px 8px;cursor:pointer">${p.vacation_home?'Unset Vacation Home':'Set as Vacation Home'}</button>`:''}

        <div><div class="opt-label">${h.label}</div><div class="opt-desc">${h.desc}<br>~${fmt$(price)} base · 20% down · 6.5% mortgage</div></div>

function selectNeighborhood(typeId, basePrice) {
  const h = HOUSE_TYPES.find(x=>x.id===typeId);
  let html = `<h2>${h.emoji} ${h.label}</h2><div class="modal-sub">Choose a neighborhood — it shapes price, growth, and risk</div><div id="modal-options">`;
  NEIGHBORHOODS.forEach(n => {
    const price = Math.round(basePrice * n.priceMult);
    html += `<button class="modal-opt" onclick="buyProperty('${typeId}',${price},'${n.id}')">
      <span class="opt-icon">${n.emoji}</span>
      <div><div class="opt-label">${n.label}</div><div class="opt-desc">${n.desc}<br>Price: ${fmt$(price)} · 20% down (${fmt$(Math.round(price*0.2))})</div></div>
    </button>`;
  });
  html += `</div><button class="modal-btn secondary" onclick="showRealEstate()">← Back</button>`;
  openModal(html);
}

function buyProperty(typeId, price, neighborhoodId) {
  const h = HOUSE_TYPES.find(x=>x.id===typeId);
  const n = NEIGHBORHOODS.find(x=>x.id===neighborhoodId) || NEIGHBORHOODS[1];
  const down = Math.round(price * 0.2);
  if(G.bank < down) {
    addLog(`❌ Not enough for down payment (${fmt$(down)})`, "bad");
    closeModal(); render(); return;
  }
  G.bank -= down;
  const mortgage = price - down;
  const rate = clamp(G.mortgage_market_rate + getCreditTier(G.credit_score).mortgageAdj, 0.025, 0.14);
  const monthly = Math.round(mortgage * (rate/12) / (1-Math.pow(1+rate/12,-360)));
  G.properties.push({
    id:typeId, label:h.label, emoji:h.emoji, category:h.category, value:price, purchase_price:price,
    mortgage_balance:mortgage, monthly_payment:monthly, mortgage_rate:rate, renting:false, rent_income:0,
    shortterm:false, happiness:h.happiness, renovations:[], insured:false, vacation_home:false,
    neighborhood:n.id, neighborhoodLabel:n.label, appreciationBonus:n.appreciationBonus, riskWeight:n.riskWeight,
    flip:false,
  });
  addLog(`🏠 Bought ${h.label} in a ${n.label.toLowerCase()} for ${fmt$(price)}! Monthly payment: ${fmt$(monthly)} (${(rate*100).toFixed(2)}% rate)`, "money");
  closeModal(); render();
}

// ── Fixer-Uppers / House Flipping ──
function showFixerUppers() {
  let html = `<h2>🔨 Fixer-Uppers</h2><div class="modal-sub">Buy distressed properties below market, renovate, then flip for a premium.</div><div id="modal-options">`;
  const picks = [HOUSE_TYPES.find(h=>h.category==="Starter"), HOUSE_TYPES.find(h=>h.category==="Suburban"), HOUSE_TYPES.find(h=>h.category==="Suburban" && h.id!=="townhouse")||HOUSE_TYPES[6], pick(HOUSE_TYPES.filter(h=>h.category!=="Ultra-Luxury"))];
  const uniquePicks = [...new Map(picks.filter(Boolean).map(h=>[h.id,h])).values()];
  uniquePicks.forEach(h => {
    const marketPrice = rand(h.minCost, h.maxCost);
    const discount = randF(0.45, 0.68);
    const fixerPrice = Math.round(marketPrice * discount);
    html += `<button class="modal-opt" onclick="buyFixerUpper('${h.id}',${fixerPrice},${marketPrice})">
      <span class="opt-icon">🛠️</span>
      <div><div class="opt-label">Distressed ${h.label}</div><div class="opt-desc">${fmt$(fixerPrice)} (~${Math.round((1-discount)*100)}% below market) · Needs work · Market value once fixed: ~${fmt$(marketPrice)}</div></div>
    </button>`;
  });
  html += `</div><button class="modal-btn secondary" onclick="showRealEstate()">← Back</button>`;
  openModal(html);
}

function buyFixerUpper(typeId, price, marketPrice) {
  const h = HOUSE_TYPES.find(x=>x.id===typeId);
  const down = Math.round(price * 0.2);
  if(G.bank < down) { addLog(`❌ Not enough for down payment (${fmt$(down)})`, "bad"); closeModal(); render(); return; }
  G.bank -= down;
  const mortgage = price - down;
  const rate = G.mortgage_market_rate;
  const monthly = Math.round(mortgage * (rate/12) / (1-Math.pow(1+rate/12,-360)));
  G.properties.push({
    id:typeId, label:"Fixer-Upper "+h.label, emoji:h.emoji, category:h.category, value:price, purchase_price:price,
    mortgage_balance:mortgage, monthly_payment:monthly, mortgage_rate:rate, renting:false, rent_income:0,
    shortterm:false, happiness:Math.max(1,h.happiness-4), renovations:[], insured:false, vacation_home:false,
    neighborhood:"established", neighborhoodLabel:"Established Neighborhood", appreciationBonus:0, riskWeight:1.3,
    flip:true, flip_market_value:marketPrice,
  });
  addLog(`🛠️ Picked up a distressed ${h.label} for ${fmt$(price)}. Time to renovate!`, "money");
  closeModal(); render();
}

function flipSell(i) {
  const p = G.properties[i];
  if(!p) return;
  const renoCount = (p.renovations||[]).length;
  if(renoCount === 0) { addLog("Renovate at least once before flipping — buyers can tell.", "info"); closeModal(); render(); return; }
  // Flip premium: base market value + renovation-driven appreciation + a bonus for a fully-renovated flip
  const flipBonus = 1 + Math.min(renoCount * 0.06, 0.30);
  const saleValue = Math.round(Math.max(p.value, p.flip_market_value) * flipBonus);
  const profit = saleValue - p.mortgage_balance - p.purchase_price;
  G.bank += Math.round(saleValue - p.mortgage_balance);
  addLog(`🏆 Flipped ${p.label} for ${fmt$(saleValue)}! Profit: ${fmt$(Math.round(profit))} after ${renoCount} renovation(s).`, profit>0?"special":"bad");
  if(G.primary_residence_idx === i) G.primary_residence_idx = -1;
  else if(G.primary_residence_idx > i) G.primary_residence_idx--;
  G.properties.splice(i, 1);
  closeModal(); render();
}

function moveIntoProperty(i) {
  const p = G.properties[i];
  if(!p) return;
  if(p.renting) { p.renting = false; p.rent_income = 0; }
  G.primary_residence_idx = i;
  G.rental_home = null;
  G.happiness = clamp(G.happiness + 8, 5, 100);
  addLog(`🏡 Moved into ${p.label}!`, "good");
  closeModal(); render();
}

function moveOutOfProperty() {
  const p = G.properties[G.primary_residence_idx];
  addLog(p ? `📦 Moved out of ${p.label}.` : "📦 Moved out.", "info");
  G.primary_residence_idx = -1;
  closeModal(); render();
}

function rentApartment(typeId) {
  const h = HOUSE_TYPES.find(x=>x.id===typeId);
  if(!h) return;
  G.rental_home = { id:h.id, label:h.label, emoji:h.emoji, monthlyRent:h.rent };
  G.primary_residence_idx = -1;
  G.happiness = clamp(G.happiness + 5, 5, 100);
  addLog(`🔑 Moved into a rented ${h.label} (${fmt$(h.rent)}/mo)`, "good");
  closeModal(); render();
}

function moveOutRental() {
  addLog(`📦 Moved out of your rented ${G.rental_home?.label||'place'}.`, "info");
  G.rental_home = null;
  closeModal(); render();
}

function rentOut(i) {
  const p = G.properties[i];
  const rent = Math.round(p.value * 0.006);
  p.renting = true;
  p.shortterm = false;
  p.rent_income = rent;
  addLog(`🏠 Started renting ${p.label} long-term for ${fmt$(rent)}/month`, "money");
  closeModal(); render();
}

function stopRenting(i) {
  G.properties[i].renting = false;
  G.properties[i].shortterm = false;
  G.properties[i].rent_income = 0;
  addLog(`Stopped renting ${G.properties[i].label}`, "info");
  closeModal(); render();
}

function listAirbnb(i) {
  const p = G.properties[i];
  const rent = Math.round(p.value * 0.011); // higher than long-term, but variance applied yearly
  p.renting = true;
  p.shortterm = true;
  p.rent_income = rent;
  addLog(`🔑 Listed ${p.label} on Airbnb — est. ${fmt$(rent)}/mo (varies with demand)`, "money");
  closeModal(); render();
}

function toggleVacationHome(i) {
  const p = G.properties[i];
  p.vacation_home = !p.vacation_home;
  addLog(p.vacation_home ? `🌴 ${p.label} is now your vacation home.` : `${p.label} is no longer marked as a vacation home.`, "info");
  closeModal(); render();
}

function visitVacationHome(i) {
  const p = G.properties[i];
  if(!p) return;
  const cost = rand(150, 600);
  if(G.bank < cost) { addLog("Not enough money for the trip", "bad"); closeModal(); render(); return; }
  G.bank -= cost;
  G.happiness = clamp(G.happiness + rand(10,20), 5, 100);
  G.health = clamp(G.health + rand(2,6), 1, 100);
  addLog(`🌴 Got away to ${p.label} for a few days. Feeling refreshed!`, "good");
  closeModal(); render();
}

function buyInsurance(i) {
  const p = G.properties[i];
  if(!p) return;
  p.insured = true;
  addLog(`🛡️ Insured ${p.label}. Premiums are worth the peace of mind.`, "info");
  closeModal(); render();

function cancelInsurance(i) {
  const p = G.properties[i];
  if(!p) return;
  p.insured = false;
  addLog(`Dropped insurance on ${p.label}.`, "info");
  closeModal(); render();
}

function makeExtraPayment(i) {
  const p = G.properties[i];
  if(!p) return;
  const amount = Math.min(G.bank, Math.round(p.mortgage_balance * 0.1), 50000);
  if(amount < 100) { addLog("Not enough spare cash for an extra payment", "bad"); closeModal(); render(); return; }
  G.bank -= amount;
  p.mortgage_balance = Math.max(0, p.mortgage_balance - amount);
  addLog(`💵 Made an extra ${fmt$(amount)} payment on ${p.label}. Balance: ${fmt$(p.mortgage_balance)}`, "money");
  closeModal(); render();
}

function refinanceProperty(i) {
  const p = G.properties[i];
  if(!p) return;
  const fee = Math.round(p.mortgage_balance * 0.02);
  if(G.bank < fee) { addLog(`Not enough for closing costs (${fmt$(fee)})`, "bad"); closeModal(); render(); return; }
  G.bank -= fee;
  const oldRate = p.mortgage_rate;
  p.mortgage_rate = G.mortgage_market_rate;
  p.monthly_payment = Math.round(p.mortgage_balance * (p.mortgage_rate/12) / (1-Math.pow(1+p.mortgage_rate/12,-360)));
  addLog(`📉 Refinanced ${p.label}: ${(oldRate*100).toFixed(2)}% → ${(p.mortgage_rate*100).toFixed(2)}%. New payment: ${fmt$(p.monthly_payment)}/mo`, "money");
  closeModal(); render();
}

function startRoomRental() {
  if(G.primary_residence_idx < 0) return;
  G.room_rented = true;
  addLog(`🛏️ Started renting out a spare room for extra income.`, "money");
  closeModal(); render();
}

function stopRoomRental() {
  G.room_rented = false;
  addLog(`Stopped renting out your spare room.`, "info");
  closeModal(); render();
}

function sellProperty(i) {
  const p = G.properties[i];
  const profit = p.value - p.mortgage_balance;
  G.bank += Math.round(profit * 0.9);
  addLog(`🏠 Sold ${p.label} for ${fmt$(p.value)}. Net: ${fmt$(Math.round(profit*0.9))}`, "money");
  if(G.primary_residence_idx === i) G.primary_residence_idx = -1;
  else if(G.primary_residence_idx > i) G.primary_residence_idx--;
  G.properties.splice(i, 1);
  closeModal(); render();
}

function showRenovate(i) {
  const p = G.properties[i];
  if(!p) return;
  if(!p.renovations) p.renovations = [];
  let html = `<h2>🔨 Renovate ${p.label}</h2><div class="modal-sub">Current value: ${fmt$(p.value)}</div><div id="modal-options">`;
  RENOVATIONS.forEach(r => {
    const done = p.renovations.includes(r.id);
    html += `<button class="modal-opt" ${done?'style="opacity:0.4" disabled':''} onclick="${done?'':`doRenovation(${i},'${r.id}')`}">
      <span class="opt-icon">${r.emoji}</span>
      <div><div class="opt-label">${r.label}${done?' ✅':''}</div><div class="opt-desc">${fmt$(r.cost[0])}–${fmt$(r.cost[1])} · +${Math.round(r.valueBoost*100)}% value${G.primary_residence_idx===i?` · +${r.happiness} happiness`:''}</div></div>
    </button>`;
  });
  html += `</div><button class="modal-btn secondary" onclick="showRealEstate()">← Back</button>`;
  openModal(html);
}

function doRenovation(i, id) {
  const p = G.properties[i];
  const r = RENOVATIONS.find(x=>x.id===id);
  if(!p || !r) return;
  const cost = rand(r.cost[0], r.cost[1]);
  if(G.bank < cost) { addLog(`Not enough money (${fmt$(cost)})`, "bad"); closeModal(); render(); return; }
  G.bank -= cost;
  p.value = Math.round(p.value * (1 + r.valueBoost));
  if(!p.renovations) p.renovations = [];
  p.renovations.push(id);
  if(G.primary_residence_idx === i) G.happiness = clamp(G.happiness + r.happiness, 5, 100);
  addLog(`🔨 ${r.label} at ${p.label} complete (${fmt$(cost)}). New value: ${fmt$(p.value)}`, "good");
  showRenovate(i);
}

    G.married = false;
    if(G.kids.length > 0) {

}

}

function hangOutFriend(i) {
  const f = G.friends[i];
  if(!f) return;
  G.bank -= rand(20,60);
  f.closeness = clamp(f.closeness + rand(6,14), 0, 100);

}

function callFriend(i) {
  const f = G.friends[i];
  if(!f) return;
  f.closeness = clamp(f.closeness + rand(2,6), 0, 100);
  G.happiness = clamp(G.happiness + rand(1,3), 5, 100);

  addLog(`📞 Caught up with ${f.name} over the phone.`, "good");
  closeModal(); render();
}

function giftFriend(i) {
  const f = G.friends[i];
  if(!f) return;
  const cost = rand(40,200);
  if(G.bank < cost) { addLog("Not enough money for a gift", "bad"); closeModal(); render(); return; }

function favorFriend(i) {

function _rollWeighted(table) {
  const total = table.reduce((s,o)=>s+o.weight,0);
  let roll = Math.random()*total;
  for(const o of table) { if(roll < o.weight) return o; roll -= o.weight; }
  return table[0];
}

function attendParty(id) {
  const pt = PARTY_TYPES.find(x=>x.id===id);
  const cost = rand(pt.cost[0], pt.cost[1]);
  G.bank -= cost;
  G.happiness = clamp(G.happiness + rand(pt.happiness[0], pt.happiness[1]), 5, 100);
  G.health = clamp(G.health - rand(pt.health[0], pt.health[1]), 1, 100);
  if(pt.fame[1] > 0) G.fame = clamp((G.fame||0) + rand(pt.fame[0], pt.fame[1]), 0, 100);

  const outcome = _rollWeighted(PARTY_OUTCOMES);
  let msg = `${pt.emoji} ${pt.label}: ${outcome.text}`;

  if(outcome.makesFriend && G.friends.length < 15) {
    const isFemaleName = Math.random() < 0.5;
    const name = (isFemaleName?pick(NAMES_F):pick(NAMES_M)) + ' ' + pick(SURNAMES);
    G.friends.push({ name, emoji: isFemaleName?'👩':'👨', closeness: rand(20,45), metVia:"A Party", bestFriend:false });
    msg += ` Made a new friend: ${name}.`;
  }
  if(outcome.makesRomance && !G.partner) {
    const name = G.gender==='Male'?pick(NAMES_F)+' '+pick(SURNAMES):pick(NAMES_M)+' '+pick(SURNAMES);
    G.partner = { name, love:rand(35,60), emoji: G.gender==='Male'?'👩':'👨' };
    msg += ` You're now dating ${name}!`;
  } else if(outcome.makesRomance && G.partner) {
    G.partner.love = clamp(G.partner.love - rand(5,15), 0, 100);
    msg += ` ${G.partner.name} was not thrilled to hear about it.`;
  }
  if(outcome.fameBonus) { const b = rand(outcome.fameBonus[0], outcome.fameBonus[1]); G.fame = clamp((G.fame||0)+b, 0, 100); msg += ` Fame +${b}.`; }
  if(outcome.moneyLoss) { const l = rand(outcome.moneyLoss[0], outcome.moneyLoss[1]); G.bank -= l; msg += ` Lost ${fmt$(l)}.`; }
  if(outcome.healthLoss) { const l = rand(outcome.healthLoss[0], outcome.healthLoss[1]); G.health = clamp(G.health-l,1,100); msg += ` Health -${l}.`; }
  if(outcome.happinessLoss) { const l = rand(outcome.happinessLoss[0], outcome.happinessLoss[1]); G.happiness = clamp(G.happiness-l,5,100); msg += ` Happiness -${l}.`; }
  if(outcome.copRisk) {
    if(Math.random() < 0.3 && !G.criminal_record) {
      G.criminal_record = true;
      msg += ` You were cited by police — now on record.`;
    } else {
      const fine = rand(100,400);
      G.bank -= fine;
      msg += ` Paid a fine of ${fmt$(fine)} to avoid trouble.`;
    }
  }

  addLog(msg, outcome.type);
  closeModal(); render();
}

function hostParty(id) {
  const pt = PARTY_TYPES.find(x=>x.id===id);
  const guestCount = G.friends.length + (G.partner?1:0);
  const cost = Math.round(rand(pt.cost[0], pt.cost[1]) * 1.5 * (1 + guestCount*0.05));
  if(G.bank < cost) { addLog(`Not enough money to host (${fmt$(cost)})`, "bad"); closeModal(); render(); return; }
  G.bank -= cost;
  G.happiness = clamp(G.happiness + rand(pt.happiness[0]+2, pt.happiness[1]+4), 5, 100);
  G.health = clamp(G.health - rand(pt.health[0], pt.health[1]), 1, 100);
  G.fame = clamp((G.fame||0) + rand(pt.fame[0]+1, pt.fame[1]+2), 0, 100);

  // Boost all invited guests
  G.friends.forEach(f => { f.closeness = clamp(f.closeness + rand(3,8), 0, 100); _friendPromoteCheck(f); });
  if(G.partner) G.partner.love = clamp(G.partner.love + rand(3,8), 0, 100);

  const outcome = _rollWeighted(HOST_PARTY_OUTCOMES);
  let msg = `${pt.emoji} You hosted a ${pt.label.toLowerCase()} (${guestCount} guests): ${outcome.text}`;

  if(outcome.makesFriend && G.friends.length < 15) {
    const isFemaleName = Math.random() < 0.5;
    const name = (isFemaleName?pick(NAMES_F):pick(NAMES_M)) + ' ' + pick(SURNAMES);
    G.friends.push({ name, emoji: isFemaleName?'👩':'👨', closeness: rand(20,40), metVia:"Your Party", bestFriend:false });
    msg += ` New friend: ${name}.`;
  }
  if(outcome.fameBonus) { const b = rand(outcome.fameBonus[0], outcome.fameBonus[1]); G.fame = clamp((G.fame||0)+b, 0, 100); msg += ` Fame +${b}.`; }
  if(outcome.moneyLoss) { const l = rand(outcome.moneyLoss[0], outcome.moneyLoss[1]); G.bank -= l; msg += ` Cost you ${fmt$(l)}.`; }
  if(outcome.healthLoss) { const l = rand(outcome.healthLoss[0], outcome.healthLoss[1]); G.health = clamp(G.health-l,1,100); msg += ` Health -${l}.`; }
  if(outcome.copRisk) {
    if(Math.random() < 0.3 && !G.criminal_record) {
      G.criminal_record = true;
      msg += ` You were cited — now on record.`;
    } else {
      const fine = rand(150,500);
      G.bank -= fine;
      msg += ` Paid a fine of ${fmt$(fine)}.`;
    }
  }

  addLog(msg, outcome.type);
  closeModal(); render();
}

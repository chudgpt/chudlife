}

function acadSelectField(sectorKey) {
  const sector = ACAD_SECTORS[sectorKey];

  let html = `<h2>${sector.emoji} ${sector.label}</h2>
    <div class="modal-sub">${sector.desc}</div>
    <div class="modal-section"><h3>Choose Your Discipline</h3>
    <div id="modal-options" style="margin-bottom:12px">`;
  sector.disciplines.forEach(d => {
    html += `<button class="modal-opt" onclick="acadSelectDisciplineAndInstitution('${sectorKey}','${d.replace(/'/g,"\\'")}')">
      <span class="opt-icon">📚</span><div><div class="opt-label">${d}</div></div>
    </button>`;
  });
  html += `</div></div>`;
  html += `<button class="modal-btn secondary" onclick="showAcademia()">← Back</button>`;
  openModal(html);
}

function acadSelectDisciplineAndInstitution(sectorKey, discipline) {
  const sector = ACAD_SECTORS[sectorKey];
  const prestige = getPrestigeScore();
  const skillScore = calcAcadSkillAccessScore();
  const salaryBoost = calcAcadSkillSalaryBoost();
  const accessible = sector.firms.filter(f => prestige >= f.minPrestige && skillScore >= f.minSkillScore);
  const locked = sector.firms.filter(f => prestige < f.minPrestige || skillScore < f.minSkillScore);

  G.acad_target_field = sectorKey;

  let html = `<h2>${sector.emoji} ${discipline}</h2>
    <div class="modal-sub">${sector.label} · Prestige: ${prestige} · Skill score: ${skillScore}</div>
    <div id="modal-options">`;

  accessible.forEach(firm => {
    const estSalary = Math.round(rand(firm.baseSalary, firm.topSalary) * (1 + salaryBoost));
    html += `<button class="modal-opt" onclick="acadStartInterview('${sectorKey}','${firm.name.replace(/'/g,"\\'")}','${discipline.replace(/'/g,"\\'")}')">
      <span class="opt-icon">${firm.emoji}</span>
      <div>
        <div class="opt-label">${firm.name} <span style="font-size:0.62rem;color:var(--muted)">${firm.tier}</span></div>
        <div class="opt-desc">Est. ${fmt$(firm.baseSalary)}–${fmt$(firm.topSalary)}/yr base · +${Math.round(salaryBoost*100)}% skill premium → ~${fmt$(estSalary)}</div>
      </div>
    </button>`;
  });

  if(locked.length > 0) {
    html += `<div style="font-size:0.68rem;color:var(--muted);padding:8px 4px;margin-top:4px">🔒 ${locked.length} institutions locked — need higher prestige or more research skills:</div>`;
    locked.slice(0,3).forEach(f => {
      const needs = [];
      if(prestige < f.minPrestige) needs.push(`prestige ${f.minPrestige}+`);
      if(skillScore < f.minSkillScore) needs.push(`skill score ${f.minSkillScore}+`);
      html += `<button class="modal-opt" style="opacity:0.35" disabled>
        <span class="opt-icon">${f.emoji}</span>
        <div><div class="opt-label">${f.name}</div><div class="opt-desc">Requires: ${needs.join(' and ')}</div></div>
      </button>`;
    });
  }
  html += `</div><button class="modal-btn secondary" onclick="acadSelectField('${sectorKey}')">← Back</button>`;
  openModal(html);
}

function acadStartInterview(sectorKey, firmName, discipline) {
  G.acad_target_field = sectorKey;
  G.acad_target_firm = firmName;
  G.acad_discipline = discipline;
  G.acad_interview_step = 0;
  G.acad_interview_score = 0;
  acadRunInterview();
}

function acadRunInterview() {
  const qs = ACAD_INTERVIEW_QS[G.acad_target_field] || ACAD_INTERVIEW_QS.natural_sciences;
  const step = G.acad_interview_step;
  if(step >= qs.length) { acadFinishInterview(); return; }
  const q = qs[step];
  const prestige = getPrestigeScore();
  const skillScore = calcAcadSkillAccessScore();
  const firmName = G.acad_target_firm;
  const sectorLabel = ACAD_SECTORS[G.acad_target_field]?.label || '';

  openModal(`
    <h2>🎓 ${sectorLabel} Job Talk</h2>
    <div class="modal-sub">${firmName} · Question ${step+1} of ${qs.length}<br>Prestige: ${prestige}/100 · Skill score: ${skillScore} pts</div>
    <div style="background:var(--surface2);border-left:3px solid var(--orange);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:0.82rem;line-height:1.55"><b>${q.q}</b></div>
    <div id="modal-options">
      ${q.opts.map((o,i) => `<button class="modal-opt" onclick="acadAnswerQ(${i})">
        <span class="opt-icon">${i===0 ? '🎯' : i===1 ? '🤔' : '😬'}</span>
        <div><div class="opt-label" style="font-size:0.76rem;font-weight:500;line-height:1.45">${o.t}</div></div>
      </button>`).join('')}
    </div>
  `);
}

function acadAnswerQ(idx) {
  const qs = ACAD_INTERVIEW_QS[G.acad_target_field] || ACAD_INTERVIEW_QS.natural_sciences;
  const q = qs[G.acad_interview_step];
  G.acad_interview_score += q.opts[idx].pts;
  G.acad_interview_step++;
  acadRunInterview();
}

function acadFinishInterview() {
  const qs = ACAD_INTERVIEW_QS[G.acad_target_field] || ACAD_INTERVIEW_QS.natural_sciences;
  const maxScore = qs.reduce((s, q) => s + Math.max(...q.opts.map(o => o.pts)), 0);
  const interviewPct = G.acad_interview_score / maxScore;

  const prestige = getPrestigeScore();
  const skillScore = calcAcadSkillAccessScore();
  const salaryBoost = calcAcadSkillSalaryBoost();
  const sector = ACAD_SECTORS[G.acad_target_field];
  const firm = sector?.firms.find(f => f.name === G.acad_target_firm);

  // Scoring: job talk 55% + prestige 25% + skills 20%
  const prestigeNorm = Math.min(prestige / 100, 1);
  const skillNorm = Math.min(skillScore / 60, 1);
  const combined = interviewPct * 0.55 + prestigeNorm * 0.25 + skillNorm * 0.20 + Math.random() * 0.05;

  const score = G.acad_interview_score;
  G.acad_target_firm = null; G.acad_target_field = null;
  G.acad_interview_step = 0; G.acad_interview_score = 0;

  if(!firm) { closeModal(); render(); return; }

  if(combined >= 0.42) {
    const baseSalary = rand(firm.baseSalary, firm.topSalary);
    const prestigeBonus = prestige >= 80 ? Math.round(baseSalary * 0.10) :
                          prestige >= 65 ? Math.round(baseSalary * 0.06) :
                          prestige >= 48 ? Math.round(baseSalary * 0.02) : 0;
    const skillBoostedSalary = Math.round((baseSalary + prestigeBonus) * (1 + salaryBoost));

    G.acad_firm = firm.name;
    G.acad_field = Object.keys(ACAD_SECTORS).find(k => ACAD_SECTORS[k] === sector);
    G.acad_level = 0;
    G.acad_tenured = false;
    G.acad_base_salary = baseSalary + prestigeBonus;
    G.salary = skillBoostedSalary;
    G.job = `Assistant Professor — ${firm.name}`;
    G.job_years = 0;
    G.job_performance = clamp(Math.round(interviewPct * 70 + 30), 30, 90);
    G.ib_bank = null; G.ib_division = null;
    G.consulting_firm = null; G.consulting_branch = null;
    G.eng_firm = null; G.eng_sector = null;
    G.happiness = clamp(G.happiness + 15, 5, 100);
    addLog(`🎓 Hired at ${firm.name} (${firm.tier})! ${fmt$(skillBoostedSalary)}/yr`, "special");

    openModal(`
      <h2>✅ Offer Letter!</h2>
      <div class="result-card special">
        <div class="rc-title">${firm.emoji} ${firm.name} — ${firm.tier}</div>
        <div class="rc-body">
          ${sector.label} · ${G.acad_discipline}<br>
          Base salary: <b>${fmt$(baseSalary + prestigeBonus)}/yr</b>${prestigeBonus > 0 ? ` (${fmt$(prestigeBonus)} prestige premium)` : ''}<br>
          With skill bonus (+${Math.round(salaryBoost*100)}%): <b>${fmt$(skillBoostedSalary)}/yr</b>
        </div>
      </div>
      <div class="result-card">
        <div class="rc-title">Scorecard</div>
        <div class="rc-body">Job talk: ${score}/${maxScore} · Prestige: ${prestige}/100 · Skill score: ${skillScore} pts</div>
      </div>
      <button class="modal-btn" onclick="closeModal();render()">Accept Offer 🚀</button>
    `);
  } else {
    addLog(`❌ No offer from ${firm.name}. Job talk: ${score}/${maxScore}`, "bad");
    openModal(`
      <h2>❌ No Offer</h2>
      <div class="result-card bad">
        <div class="rc-title">Rejected from ${firm.name}</div>
        <div class="rc-body">
          Job talk: ${score}/${maxScore} (${Math.round(interviewPct*100)}%)<br>
          ${interviewPct < 0.45 ? '💡 Sharpen your job talk and research pitch.' :
            skillScore < firm.minSkillScore * 1.5 ? '🧪 Learn more research methods — they matter a lot here.' :
            prestige < 60 ? '⚠️ Pedigree is a factor. A stronger grad program could help.' :
            '💡 Close — publish more and come back next cycle.'}
        </div>
      </div>
      <button class="modal-btn secondary" onclick="closeModal();render()">Close</button>
    `);
  }
}

// Academic research-method skill learning
function acadLearnSkills() { _acadLearnSkillsModal(true); }
function acadLearnSkillsStandalone() { _acadLearnSkillsModal(false); }
function _acadLearnSkillsModal(fromDashboard) {
  const learned = G.acad_skills || [];
  const salaryBoost = calcAcadSkillSalaryBoost();
  const skillScore  = calcAcadSkillAccessScore();
  const categories  = [...new Set(ACAD_SKILLS.map(s => s.category))];

  let html = `<h2>🧪 Research Methods & Skills</h2>
    <div class="modal-sub">Learned: ${learned.length}/${ACAD_SKILLS.length} · Skill score: ${skillScore} pts · Salary bonus: +${Math.round(salaryBoost*100)}%</div>`;

  categories.forEach(cat => {
    const catSkills = ACAD_SKILLS.filter(s => s.category === cat);
    html += `<div class="modal-section"><h3>${cat}</h3>`;
    catSkills.forEach(skill => {
      const has = learned.includes(skill.id);
      html += `<button class="modal-opt" ${has ? 'style="border-color:var(--green)"' : ''} onclick="${has ? '' : `acadLearnSkill('${skill.id}')`}" ${has ? 'disabled' : ''}>
        <span class="opt-icon">${skill.emoji}</span>
        <div>
          <div class="opt-label">${skill.label}${has ? ' ✅' : ''}</div>
          <div class="opt-desc">${skill.desc}<br>
          <span style="color:var(--green)">+${Math.round(skill.salaryBoost*100)}% salary</span> · 
          <span style="color:var(--accent2)">+${skill.accessBoost} access pts</span>
          ${has ? '' : ' · <span style="color:var(--yellow)">Cost: $500 + 3 smarts</span>'}
          </div>
        </div>
      </button>`;
    });
    html += `</div>`;
  });
  openModal(html);
}

function acadLearnSkill(id) {
  const skill = ACAD_SKILLS.find(s => s.id === id);
  if(!skill) return;
  if((G.acad_skills||[]).includes(id)) { addLog("Already know this method", "info"); return; }
  if(G.bank < 500) { addLog("Need $500 for training/workshops", "bad"); closeModal(); render(); return; }
  if(G.smarts < 30) { addLog("Need smarts 30+ to learn research methods", "bad"); return; }
  G.bank -= 500;
  G.smarts = clamp(G.smarts - rand(0,2), 1, 100); // mental effort
  if(!G.acad_skills) G.acad_skills = [];
  G.acad_skills.push(id);
  // Immediately update salary if employed
  if(G.acad_firm) {
    const newBoost = calcAcadSkillSalaryBoost();
    G.salary = Math.round(G.acad_base_salary * (1 + newBoost));
  }
  addLog(`🧪 Learned ${skill.label}! Salary +${Math.round(skill.salaryBoost*100)}%, access +${skill.accessBoost} pts`, "good");
  _acadLearnSkillsModal(!!G.acad_firm);
}

// Academic in-role actions
function acadDoResearch() {
  const perfGain = rand(4, 12);
  G.job_performance = clamp(G.job_performance + perfGain, 0, 100);
  const papers = rand(0, 2);
  const citations = rand(5, 60) * (papers + 1);
  G.acad_papers_published = (G.acad_papers_published || 0) + papers;
  G.acad_citations = (G.acad_citations || 0) + citations;
  G.health = clamp(G.health - rand(1, 4), 1, 100);
  const grantBonus = G.job_performance >= 75 ? rand(1500, 6000) : 0;
  if(grantBonus > 0) G.bank += grantBonus;
  addLog(`📝 Research cycle complete. ${papers>0 ? `Published ${papers} paper(s), +${citations} citations. ` : 'No new paper this cycle, but data collected. '}Performance +${perfGain}${grantBonus>0 ? `, Grant bonus: ${fmt$(grantBonus)}`:''}`, "good");
  closeModal(); render();
}

function acadPursueAdvanced() {
  const certs = ACAD_SKILLS.filter(s => s.category === 'Credentials' && !(G.acad_skills||[]).includes(s.id));
  if(certs.length === 0) {
    addLog("Already hold all available academic credentials!", "good");
    closeModal(); render(); return;
  }
  let html = `<h2>🏅 Grants & Credentials</h2>
    <div class="modal-sub">High-value credentials that unlock senior roles & better institutions</div>
    <div id="modal-options">`;
  certs.forEach(cert => {
    const cost = cert.id === 'dept_chair' ? 1500 : cert.id === 'postdoc_fellowship' ? 1200 : 700;
    html += `<button class="modal-opt" onclick="acadGetCert('${cert.id}',${cost})">
      <span class="opt-icon">${cert.emoji}</span>
      <div>
        <div class="opt-label">${cert.label}</div>
        <div class="opt-desc">${cert.desc}<br>Cost: ${fmt$(cost)} · +${Math.round(cert.salaryBoost*100)}% salary · +${cert.accessBoost} access pts</div>
      </div>
    </button>`;
  });
  html += `</div>`;
  openModal(html);
}

function acadGetCert(id, cost) {
  const cert = ACAD_SKILLS.find(s => s.id === id);
  if(!cert) return;
  if(G.bank < cost) { addLog(`Need ${fmt$(cost)} for ${cert.label}`, "bad"); closeModal(); render(); return; }
  G.bank -= cost;
  if(!G.acad_skills) G.acad_skills = [];
  G.acad_skills.push(id);
  const newBoost = calcAcadSkillSalaryBoost();
  if(G.acad_firm) G.salary = Math.round(G.acad_base_salary * (1 + newBoost));
  addLog(`🏅 Earned ${cert.label}! Salary now +${Math.round(newBoost*100)}% above base`, "special");
  closeModal(); render();
}

function acadNegotiateSalary() {
  if(G.job_performance >= 65) {
    const skillBoost = calcAcadSkillSalaryBoost();
    const raise = Math.round(G.acad_base_salary * randF(0.04, 0.12));
    G.acad_base_salary += raise;
    G.salary = Math.round(G.acad_base_salary * (1 + skillBoost));
    addLog(`💵 Negotiated raise: +${fmt$(raise)}/yr base → total ${fmt$(G.salary)}/yr`, "money");
  } else {
    addLog(`❌ Raise denied. Performance ${G.job_performance}/100 — need 65+`, "bad");
  }
  closeModal(); render();
}

// Nobel Prize pursuit — a long-shot, high-glory action for renowned senior researchers
function acadPursueNobel() {
  const sector = ACAD_SECTORS[G.acad_field];
  if(!sector || !sector.nobelCategories || sector.nobelCategories.length === 0) {
    addLog("No Nobel category exists for this field.", "info");
    closeModal(); render(); return;
  }
  if((G.acad_level || 0) < 2) {
    addLog("You need to reach Full Professor before the committee will take notice.", "info");
    closeModal(); render(); return;
  }
  if(G.nobel_laureate) {
    addLog("You've already won a Nobel Prize — bask in the glory.", "info");
    closeModal(); render(); return;
  }

  const renown = acadRenownScore();
  G.acad_nobel_attempts = (G.acad_nobel_attempts || 0) + 1;

  // Base odds scale with renown, years at senior rank, and skill score; capped to keep it a long shot
  const skillScore = calcAcadSkillAccessScore();
  const yearsBonus = Math.min((G.job_years || 0) / 40, 0.15);
  const renownFactor = Math.min(renown / 400, 0.55);
  const skillFactor = Math.min(skillScore / 300, 0.10);
  const winChance = clamp(renownFactor + yearsBonus + skillFactor, 0.01, 0.7);

  // Cost of the attempt: time, health, and a research push
  G.health = clamp(G.health - rand(2, 6), 1, 100);
  G.happiness = clamp(G.happiness - rand(0, 4), 5, 100);

  if(Math.random() < winChance) {
    const category = pick(sector.nobelCategories);
    G.nobel_laureate = true;
    G.nobel_category = category;
    G.nobel_year = G.age;
    const prizeMoney = rand(950000, 1100000);
    G.bank += prizeMoney;
    G.fame = clamp((G.fame || 0) + 60, 0, 100);
    G.happiness = clamp(G.happiness + 40, 5, 100);
    G.acad_base_salary = Math.round(G.acad_base_salary * 1.25);
    G.salary = Math.round(G.acad_base_salary * (1 + calcAcadSkillSalaryBoost()));
    G.job = `Nobel Laureate, ${G.job}`;
    addLog(`🏅🎉 WON THE NOBEL PRIZE in ${category}! Prize money: ${fmt$(prizeMoney)}`, "special");
    openModal(`
      <h2>🏅 Nobel Prize!</h2>
      <div class="result-card special">
        <div class="rc-title">🎉 Nobel Prize in ${category}</div>
        <div class="rc-body">
          After ${G.acad_nobel_attempts} year(s) of groundbreaking work at ${G.acad_firm}, the committee has recognized your contributions to ${sector.label.toLowerCase()}.<br><br>
          Prize money: <b>${fmt$(prizeMoney)}</b><br>
          Fame and reputation soar. Your name enters the history books.
        </div>
      </div>
      <button class="modal-btn" onclick="closeModal();render()">Savor the Moment 🥂</button>
    `);
  } else {
    addLog(`🏅 Nominated but passed over this year (renown: ${renown} pts, odds: ${Math.round(winChance*100)}%). Keep publishing.`, "info");
    openModal(`
      <h2>📯 Not This Year</h2>
      <div class="result-card">
        <div class="rc-body">
          Your renown (${renown} pts) earned a nomination, but the committee went another direction this cycle.<br><br>
          Estimated odds were ~${Math.round(winChance*100)}%. More papers, citations, and years at the top of your field will improve your chances.
        </div>
      </div>
      <button class="modal-btn secondary" onclick="closeModal();render()">Keep Working</button>
    `);
  }
}

function acadChangeFirm() {
  G.acad_firm = null; G.acad_field = null; G.acad_level = 0; G.acad_base_salary = 0; G.acad_tenured = false;
  G.job = null; G.salary = 0;
  addLog("Resigned from institution — searching for new academic opportunities", "info");
  showAcademia();
}

function quitAcademia() {
  addLog(`🚪 Left ${G.acad_firm}`, "info");
  G.acad_firm = null; G.acad_field = null; G.acad_level = 0; G.acad_base_salary = 0; G.acad_tenured = false;
  G.job = null; G.salary = 0;
  G.happiness = clamp(G.happiness - 5, 5, 100);
  closeModal(); render();
}

function showCrime() {
  openModal(`
    <h2>😈 Crime</h2>
    <div class="modal-sub">⚠️ Crime is risky. Getting caught has consequences.</div>
    <div id="modal-options">
      <button class="modal-opt" onclick="shoplift()"><span class="opt-icon">🛒</span><div><div class="opt-label">Shoplift</div><div class="opt-desc">Steal small items. Easy but petty.</div></div></button>
      <button class="modal-opt" onclick="carjack()"><span class="opt-icon">🚗</span><div><div class="opt-label">Carjack</div><div class="opt-desc">Steal a vehicle. High risk.</div></div></button>
      <button class="modal-opt" onclick="robBank()"><span class="opt-icon">🏦</span><div><div class="opt-label">Rob a Bank</div><div class="opt-desc">Big money, huge risk.</div></div></button>
      <button class="modal-opt" onclick="runScam()"><span class="opt-icon">📧</span><div><div class="opt-label">Run a Scam</div><div class="opt-desc">Fraud and deception.</div></div></button>
    </div>
  `);
}

function shoplift() {
  if(Math.random()<0.7){
    G.bank+=rand(20,150);
    addLog("🛒 Successfully shoplifted. Morally questionable.", "bad");
  } else {
    G.bank-=rand(200,500);
    G.criminal_record=true;
    G.happiness=clamp(G.happiness-15,5,100);
    addLog("🚔 Caught shoplifting! Paid a fine.", "bad");
  }
  closeModal(); render();
}

function carjack() {
  if(Math.random()<0.4){
    const loot = rand(3000, 14000);
    G.bank += loot;
    addLog(`🚗 Carjacked a vehicle and fenced it for ${fmt$(loot)}.`, "bad");
  } else {
    G.bank-=rand(1000,5000);
    G.health=clamp(G.health-rand(10,25),1,100);
    G.criminal_record=true;
    addLog("🚔 Caught carjacking! Injured and arrested.", "bad");
  }
  closeModal(); render();
}

function robBank() {
  if(Math.random()<0.2){
    const loot=rand(50000,200000);
    G.bank+=loot;
    addLog(`🏦 Robbed a bank! Got away with ${fmt$(loot)}!`, "bad");
  } else {
    G.bank-=rand(5000,20000);
    G.health=clamp(G.health-rand(20,40),1,100);
    G.criminal_record=true;
    G.happiness=clamp(G.happiness-30,5,100);
    addLog("🚔 Bank robbery failed. You were arrested and served time.", "bad");
  }
  closeModal(); render();
}

function runScam() {
  if(Math.random()<0.5){
    const amt=rand(1000,8000);
    G.bank+=amt;
    addLog(`📧 Scam worked! Pocketed ${fmt$(amt)}.`, "bad");
  } else {
    G.bank-=rand(2000,10000);
    G.criminal_record=true;
    addLog("🚔 Scam exposed! Paid fines and lost reputation.", "bad");
  }
  closeModal(); render();
}

        <b>Monthly Expenses:</b> ${fmt$(_calcMonthlyHousing()+_calcMonthlyInsurance()+_calcMonthlyFuel()+_calcMonthlySubscriptions()+_calcMonthlyGroceries()+_calcMonthlyDining()+_calcMonthlyUtilities())}<br>

      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0">
        <div class="stat-box"><div class="stat-label">Education</div><div class="stat-val" style="font-size:0.85rem;color:var(--accent)">${eduLabel(G.education)}</div></div>
        <div class="stat-box"><div class="stat-label">Net Worth</div><div class="stat-val" style="font-size:0.85rem;color:var(--yellow)">${fmt$(G.net_worth)}</div></div>

function renderStart() {
  const root = document.getElementById('game-root');
  root.innerHTML = `
    <div id="start-screen" class="screen">
      <span class="big-emoji">🌍</span>
      <h2>Begin a New Life</h2>
      <p>Every choice shapes your destiny. Will you rise to the top, or live simply and happily?</p>
      <div id="start-form">
        <label>Your Name</label>
        <input type="text" id="inp-name" placeholder="Enter your name" maxlength="24" />
        <label>Gender</label>
        <select id="inp-gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Non-binary">Non-binary</option>
        </select>
        <label>Country</label>
        <select id="inp-country">${COUNTRIES.map(c=>`<option>${c}</option>`).join('')}</select>
        <button class="modal-btn" onclick="startGame()">Begin Life 🚀</button>
      </div>
    </div>

}

function startGame() {
  const name = document.getElementById('inp-name').value.trim() || pick([...NAMES_M,...NAMES_F])+' '+pick(SURNAMES);
  const gender = document.getElementById('inp-gender').value;
  const country = document.getElementById('inp-country').value;
  G = newGame(name, gender, country);
  addLog(`👶 ${name} was born in ${G.city}, ${G.country}!`, "special");
  addLog(`✨ Traits: ${G.traits.join(' & ')}`, "info");
  render();
}

renderStart();

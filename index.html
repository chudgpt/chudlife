function investMoney() {
  const amt = Math.min(Math.round(G.bank*0.3), G.bank);
  if(amt<100){addLog("Not enough money to invest","bad");closeModal();render();return;}
  G.bank -= amt;
  G.investments += amt;
  addLog(`📈 Invested ${fmt$(amt)} in stocks`, "money");
  closeModal(); render();
}

function investCrypto() {
  const amt = Math.min(Math.round(G.bank*0.2), G.bank);
  if(amt<50){addLog("Not enough money","bad");closeModal();render();return;}
  G.bank -= amt;
  const mult = randF(0.1, 3.0);
  const result = Math.round(amt*mult);
  G.bank += result;
  if(result>amt) addLog(`₿ Crypto investment: ${fmt$(amt)} → ${fmt$(result)} 🚀`, "money");
  else addLog(`₿ Crypto crashed! ${fmt$(amt)} → ${fmt$(result)} 😭`, "bad");
  closeModal(); render();
}

function payLoans() {
  const total = G.college_student_loans + G.grad_loans;
  if(total<=0){addLog("No loans to pay!","good");closeModal();render();return;}
  const pay = Math.min(Math.round(G.bank*0.3), total, G.bank);
  if(pay<=0){addLog("Not enough money","bad");closeModal();render();return;}
  G.bank -= pay;
  if(G.grad_loans>0) { const d=Math.min(pay,G.grad_loans); G.grad_loans-=d; }
  else G.college_student_loans = Math.max(0,G.college_student_loans-pay);
  addLog(`💸 Paid ${fmt$(pay)} toward student loans`, "money");
  closeModal(); render();
}

function openSavings() {
  const amt = Math.round(G.bank*0.25);
  if(amt<100){addLog("Not enough money","bad");closeModal();render();return;}
  G.bank -= amt;
  G.investments += Math.round(amt*1.04);
  addLog(`🏦 Moved ${fmt$(amt)} to high-yield savings (+4%)`, "money");
  closeModal(); render();
}

function gamble() {
  const amt = Math.min(rand(100,2000), G.bank);

  G.bank -= amt;
  if(Math.random()<0.45) {

function cashOut(fraction) {
  if(G.investments <= 0) { addLog("Nothing to cash out","info"); closeModal(); render(); return; }
  const gross = Math.round(G.investments * fraction);

  const net = gross - tax;
  G.investments -= gross;
  if(G.investments < 0) G.investments = 0;
  G.bank += net;
  addLog(`💵 Cashed out ${fmt$(gross)} from investments → ${fmt$(net)} after ${fmt$(tax)} capital gains tax`, "money");
  closeModal(); render();
}

function _calcMonthlyHousing() {
  let total = G.properties.reduce((s,p)=> s + (p.mortgage_balance>0 ? p.monthly_payment : 0), 0);
  if(G.rental_home) total += G.rental_home.monthlyRent;
  return total;
}
function _calcMonthlyInsurance() {
  return Math.round(G.vehicles.reduce((s,v)=>s+(v.insurance_premium||0),0) / 12);
}
function _calcMonthlyFuel() {
  return G.vehicles.reduce((s,v)=> s + Math.round((FUEL_COST_BY_CATEGORY[v.category]||100) * (v.fuel==='none'?0:1)), 0);
}
function _calcMonthlySubscriptions() {
  return G.subscriptions.reduce((s,id)=>{ const sub = SUBSCRIPTIONS.find(x=>x.id===id); return s + (sub?sub.cost:0); }, 0);
}
function _calcMonthlyGroceries() {
  const t = GROCERY_TIERS.find(x=>x.id===G.grocery_tier) || GROCERY_TIERS[1];
  return t.monthlyCost;
}
function _calcMonthlyDining() {
  const t = DINING_TIERS.find(x=>x.id===G.dining_tier) || DINING_TIERS[1];
  return t.monthlyCost;
}
function _calcMonthlyUtilities() {
  const t = UTILITY_TIERS.find(x=>x.id===G.utility_tier) || UTILITY_TIERS[1];
  return t.monthlyCost;
}

function showExpenses() {
  const housing = _calcMonthlyHousing();
  const insurance = _calcMonthlyInsurance();
  const fuel = _calcMonthlyFuel();
  const subs = _calcMonthlySubscriptions();
  const groceries = _calcMonthlyGroceries();
  const dining = _calcMonthlyDining();
  const utilities = _calcMonthlyUtilities();
  const debtPayments = Math.round(G.loans.reduce((s,l)=>s+l.monthly_payment,0) + G.credit_cards.reduce((s,c)=>s+Math.max(c.balance*0.03,c.balance>0?25:0),0));
  const total = housing + insurance + fuel + subs + groceries + dining + utilities + debtPayments;
  const groceryTier = GROCERY_TIERS.find(x=>x.id===G.grocery_tier) || GROCERY_TIERS[1];
  const diningTier = DINING_TIERS.find(x=>x.id===G.dining_tier) || DINING_TIERS[1];
  const utilityTier = UTILITY_TIERS.find(x=>x.id===G.utility_tier) || UTILITY_TIERS[1];
  const creditTier = getCreditTier(G.credit_score);

  let html = `<h2>💳 Expenses & Bills</h2>`;
  if(G.age < 18) {
    html += `<div class="modal-sub">You're still a minor — your family covers most bills. Full personal expenses kick in at 18.</div>`;
  }
  html += `<div class="result-card ${total > G.salary/12 && G.salary>0 ? 'bad':'good'}">
      <div class="rc-title">Monthly Burn</div>
      <div class="rc-body" style="font-size:0.78rem;line-height:1.9">

function _totalDebt() {
  return G.college_student_loans + G.grad_loans
    + G.loans.reduce((s,l)=>s+l.balance,0)
    + G.credit_cards.reduce((s,c)=>s+c.balance,0)
    + (G.heloc ? G.heloc.balance : 0);
}

  const tier = getCreditTier(G.credit_score);

  let html = `<h2>💳 Debt & Credit</h2>`;

        </div>
      </div>`;

    html += `</div>`;

        <div class="prop-name">💳 ${c.label}</div>

    ${consolidatable > 1000 ? `<button class="modal-opt" onclick="consolidateDebt()"><span class="opt-icon">🔗</span><div><div class="opt-label">Consolidate Debt</div><div class="opt-desc">Roll ${fmt$(Math.round(consolidatable))} of card/loan debt into one loan at ${Math.round(tier.personalAPR*100)}% APR</div></div></button>` : ''}

function showLoanTermMenu(purposeId, amount) {
  const purpose = LOAN_PURPOSES.find(p=>p.id===purposeId);
  const tier = getCreditTier(G.credit_score);
  const rate = clamp(tier.personalAPR + (purpose.rateAdj||0), 0.03, 0.35);
  let html = `<h2>${purpose.emoji} ${fmt$(amount)} — Choose a Term</h2><div id="modal-options">`;
  LOAN_TERMS.forEach(t => {
    const months = t.years * 12;
    const monthly = Math.round(amount * (rate/12) / (1-Math.pow(1+rate/12,-months)));
    const totalPaid = monthly * months;
    html += `<button class="modal-opt" onclick="finalizeLoan('${purposeId}',${amount},${t.years})">
      <span class="opt-icon">📅</span>
      <div><div class="opt-label">${t.label}</div><div class="opt-desc">${t.desc}<br>${fmt$(monthly)}/mo · Total paid: ${fmt$(totalPaid)} (${fmt$(totalPaid-amount)} interest)</div></div>
    </button>`;
  });
  html += `</div><button class="modal-btn secondary" onclick="showLoanAmountMenu('${purposeId}')">← Back</button>`;
  openModal(html);
}

function finalizeLoan(purposeId, amount, years) {
  const purpose = LOAN_PURPOSES.find(p=>p.id===purposeId);
  const tier = getCreditTier(G.credit_score);
  const rate = clamp(tier.personalAPR + (purpose.rateAdj||0), 0.03, 0.35);
  const months = years * 12;
  const monthly = Math.round(amount * (rate/12) / (1-Math.pow(1+rate/12,-months)));
  G.loans.push({ id:'loan_'+Date.now(), type:'personal', label:purpose.label, emoji:purpose.emoji, balance:amount, rate, monthly_payment:monthly, term:months });
  G.bank += amount;
  G.credit_score = clamp(G.credit_score - rand(2,6), 300, 850);
  let effectMsg = '';
  if(purpose.effect === 'health') { G.health = clamp(G.health + rand(10,20), 1, 100); effectMsg = ' Health improved.'; }
  if(purpose.effect === 'love' && G.partner) { G.partner.love = clamp(G.partner.love + rand(15,25), 0, 100); effectMsg = ` ${G.partner.name}'s love grew.`; }
  if(purpose.effect === 'performance') { G.job_performance = clamp((G.job_performance||50) + rand(5,12), 0, 100); effectMsg = ' Job performance improved.'; }
  if(purpose.effect === 'home' && G.primary_residence_idx >= 0) { const h = G.properties[G.primary_residence_idx]; h.value = Math.round(h.value * 1.05); effectMsg = ` ${h.label} value increased.`; }
  addLog(`💵 Took out a ${fmt$(amount)} ${purpose.label.toLowerCase()} at ${Math.round(rate*100)}% APR, ${years}-yr term (${fmt$(monthly)}/mo).${effectMsg}`, "money");
  closeModal(); render();
}

function takePaydayLoan(amount) {
  const months = 12;
  const monthly = Math.round(amount * (1 + PAYDAY_RATE) / months);
  G.loans.push({ id:'payday_'+Date.now(), type:'payday', label:'Payday Loan', emoji:'⚠️', balance:amount, rate:PAYDAY_RATE, monthly_payment:monthly, term:months });
  G.bank += amount;
  addLog(`⚠️ Took a ${fmt$(amount)} payday loan. Extremely high interest — pay it off fast.`, "bad");
  closeModal(); render();
}

// ── HELOC ──
function openHeloc() {
  const home = G.properties[G.primary_residence_idx];
  if(!home) return;
  const equity = home.value - home.mortgage_balance;
  const limit = Math.round(equity * 0.7);
  const rate = clamp(G.mortgage_market_rate + 0.015, 0.04, 0.12);
  G.heloc = { limit, balance:0, rate };
  addLog(`🏠 Opened a HELOC against ${home.label}: ${fmt$(limit)} limit at ${Math.round(rate*100)}% APR`, "money");
  closeModal(); render();
}

function helocDraw() {
  if(!G.heloc) return;
  const available = G.heloc.limit - G.heloc.balance;
  const amount = Math.min(available, 10000);
  if(amount < 100) { addLog("No available equity to draw", "bad"); return; }
  G.heloc.balance += amount;
  G.bank += amount;
  addLog(`🏠 Drew ${fmt$(amount)} from your HELOC`, "money");
  showDebtCredit();
}

function helocPay() {
  if(!G.heloc) return;
  const amount = Math.min(G.bank, G.heloc.balance);
  if(amount < 20) { addLog("Not enough money or nothing owed", "bad"); return; }
  G.bank -= amount;
  G.heloc.balance = Math.max(0, G.heloc.balance - amount);
  addLog(`🏠 Paid ${fmt$(amount)} toward your HELOC. Balance: ${fmt$(Math.round(G.heloc.balance))}`, "money");
  showDebtCredit();
}

// ── Debt consolidation ──
function consolidateDebt() {
  const tier = getCreditTier(G.credit_score);
  const cardTotal = G.credit_cards.reduce((s,c)=>s+c.balance,0);
  const loanTotal = G.loans.filter(l=>l.type==='personal'||l.type==='payday').reduce((s,l)=>s+l.balance,0);
  const total = Math.round(cardTotal + loanTotal);
  if(total < 1000) { addLog("Not enough eligible debt to consolidate", "info"); return; }
  const months = 84; // 7-year consolidation term
  const monthly = Math.round(total * (tier.personalAPR/12) / (1-Math.pow(1+tier.personalAPR/12,-months)));
  G.credit_cards.forEach(c => c.balance = 0);
  G.loans = G.loans.filter(l => l.type !== 'personal' && l.type !== 'payday');
  G.loans.push({ id:'consolidation_'+Date.now(), type:'personal', label:'Debt Consolidation Loan', emoji:'🔗', balance:total, rate:tier.personalAPR, monthly_payment:monthly, term:months });
  G.credit_score = clamp(G.credit_score + rand(5,12), 300, 850);
  addLog(`🔗 Consolidated ${fmt$(total)} of debt into one loan at ${Math.round(tier.personalAPR*100)}% APR (${fmt$(monthly)}/mo). Credit score improved.`, "good");
  closeModal(); render();
}

function payExtraOnLoan(id) {
  const l = G.loans.find(x=>x.id===id);
  if(!l) return;
  const amount = Math.min(G.bank, Math.round(l.balance*0.2), 20000);
  if(amount < 50) { addLog("Not enough spare cash for an extra payment", "bad"); return; }
  G.bank -= amount;
  l.balance = Math.max(0, l.balance - amount);
  if(l.balance <= 0) { G.loans = G.loans.filter(x=>x.id!==id); G.credit_score = clamp(G.credit_score+rand(5,10),300,850); addLog(`🎉 Paid off your ${l.label}! Credit score improved.`, "good"); }
  else addLog(`💵 Paid an extra ${fmt$(amount)} on ${l.label}. Balance: ${fmt$(Math.round(l.balance))}`, "money");
  showDebtCredit();
}

function payOffLoanFull(id) {
  const l = G.loans.find(x=>x.id===id);
  if(!l) return;
  if(G.bank < l.balance) { addLog(`Not enough to pay off in full (${fmt$(Math.round(l.balance))})`, "bad"); return; }
  G.bank -= l.balance;
  G.loans = G.loans.filter(x=>x.id!==id);
  G.credit_score = clamp(G.credit_score + rand(8,15), 300, 850);
  addLog(`🎉 Paid off your ${l.label} in full! Credit score improved.`, "good");
  showDebtCredit();
}

function applyForCreditCard() {
  const tier = getCreditTier(G.credit_score);
  if(G.credit_score < 500) { addLog("Application denied — credit score too low.", "bad"); return; }
  G.credit_cards.push({ id:'card_'+Date.now(), label:`Card ${G.credit_cards.length+1}`, limit:tier.cardLimit, balance:0, apr:tier.cardAPR });
  G.credit_score = clamp(G.credit_score - rand(2,5), 300, 850);
  addLog(`💳 Approved for a new credit card! Limit: ${fmt$(tier.cardLimit)} at ${Math.round(tier.cardAPR*100)}% APR`, "money");
  showDebtCredit();
}

function requestLimitIncrease(id) {
  const c = G.credit_cards.find(x=>x.id===id);
  if(!c) return;
  const tier = getCreditTier(G.credit_score);
  const util = c.balance / c.limit;
  const approveChance = util < 0.3 ? 0.75 : util < 0.6 ? 0.4 : 0.15;
  if(Math.random() < approveChance) {
    const increase = Math.round(c.limit * 0.5);
    c.limit += increase;
    addLog(`💳 Limit increase approved on ${c.label}! New limit: ${fmt$(c.limit)}`, "good");
  } else {
    G.credit_score = clamp(G.credit_score - 1, 300, 850);
    addLog(`💳 Limit increase denied on ${c.label}.`, "bad");
  }
  showDebtCredit();
}

function cardCashAdvance(id) {
  const c = G.credit_cards.find(x=>x.id===id);
  if(!c) return;
  const available = c.limit - c.balance;
  const amount = Math.min(available, 2000);
  if(amount < 50) { addLog("No available credit for an advance", "bad"); return; }
  const fee = Math.round(amount * 0.03);
  c.balance += amount + fee;
  G.bank += amount;
  addLog(`💳 Cash advance of ${fmt$(amount)} from ${c.label} (${fmt$(fee)} fee)`, "money");
  showDebtCredit();
}

function payDownCard(id) {
  const c = G.credit_cards.find(x=>x.id===id);
  if(!c) return;
  const amount = Math.min(G.bank, c.balance);
  if(amount < 20) { addLog("Not enough money or nothing owed", "bad"); return; }
  G.bank -= amount;
  c.balance = Math.max(0, c.balance - amount);
  if(c.balance <= 0) G.credit_score = clamp(G.credit_score + rand(3,7), 300, 850);
  addLog(`💳 Paid ${fmt$(amount)} toward ${c.label}. Balance: ${fmt$(Math.round(c.balance))}`, "money");
  showDebtCredit();
}

function showVehiclePaymentOptions(id) {
  const v = VEHICLES.find(x=>x.id===id);
  if(!v) return;
  const tier = getCreditTier(G.credit_score);
  const down = Math.round(v.cost * 0.1);

  const monthly = Math.round(financeAmt * (tier.autoAPR/12) / (1-Math.pow(1+tier.autoAPR/12,-60)));
  let html = `<h2>${v.emoji} ${v.brand} ${v.model}</h2><div class="modal-sub">${fmt$(v.cost)} · How do you want to pay?</div>
    <div id="modal-options">

      </button>
    </div>

function financeVehicle(id) {
  const v = VEHICLES.find(x=>x.id===id);
  if(!v) return;
  const tier = getCreditTier(G.credit_score);
  const down = Math.round(v.cost * 0.1);
  if(G.bank < down) { addLog(`❌ Can't afford the down payment (${fmt$(down)})`, "bad"); closeModal(); render(); return; }
  G.bank -= down;
  const financeAmt = v.cost - down;
  const monthly = Math.round(financeAmt * (tier.autoAPR/12) / (1-Math.pow(1+tier.autoAPR/12,-60)));
  G.vehicles.push({ ...v, value:v.cost, age:0, insurance:'none', insurance_premium:0 });
  G.loans.push({ id:'auto_'+Date.now(), type:'auto', label:`Auto Loan — ${v.brand} ${v.model}`, emoji:'🚗', balance:financeAmt, rate:tier.autoAPR, monthly_payment:monthly, term:60 });
  G.credit_score = clamp(G.credit_score - rand(2,5), 300, 850);
  addLog(`🏦 Financed a ${v.brand} ${v.model}: ${fmt$(down)} down, ${fmt$(monthly)}/mo at ${Math.round(tier.autoAPR*100)}% APR`, "money");
  G.happiness=clamp(G.happiness+8,5,100);
  closeModal(); render();
}

function confirmVehicle(id) {
  const v = VEHICLES.find(x=>x.id===id);
  if(G.bank<v.cost){addLog(`❌ Can't afford ${v.brand} ${v.model} (${fmt$(v.cost)})`, "bad");closeModal();render();return;}
  G.bank -= v.cost;
  G.vehicles.push({ ...v, value:v.cost, age:0, insurance:'none', insurance_premium:0 });
  addLog(`🚗 Bought a ${v.brand} ${v.model} for ${fmt$(v.cost)}!`, "good");
  G.happiness=clamp(G.happiness+8,5,100);
  closeModal(); render();
}

function showInsuranceMenu(i) {
  const v = G.vehicles[i];
  if(!v) return;
  const isYoungDriver = G.age < 25;
  const isHighRisk = v.category === "Sports/Exotic";
  const creditTier = getCreditTier(G.credit_score);
  const creditMult = 1 + (670 - G.credit_score) / 1000; // better credit = lower premium in most US states
  let html = `<h2>🛡️ Insure ${v.brand} ${v.model}</h2>
    <div class="modal-sub">Value: ${fmt$(Math.round(v.value))}${isYoungDriver?' · Young driver surcharge applies':''}${isHighRisk?' · High-performance surcharge applies':''} · Credit tier: <span style="color:${creditTier.color}">${creditTier.label}</span></div>
    <div id="modal-options">`;
  CAR_INSURANCE_TIERS.forEach(t => {
    let premium = Math.round(v.value * t.rate);
    if(isYoungDriver) premium = Math.round(premium * 1.4);
    if(isHighRisk) premium = Math.round(premium * 1.5);
    if(G.criminal_record) premium = Math.round(premium * 1.2);
    if(t.id !== 'none') premium = Math.round(premium * clamp(creditMult, 0.85, 1.35));
    const active = v.insurance === t.id;
    html += `<button class="modal-opt" ${active?'style="border-color:var(--green)"':''} onclick="setInsurance(${i},'${t.id}',${premium})">
      <span class="opt-icon">${t.id==='none'?'⚠️':'🛡️'}</span>
      <div><div class="opt-label">${t.label}${active?' ✅':''}</div><div class="opt-desc">${t.desc}<br>${premium>0?`${fmt$(premium)}/yr · covers ~${Math.round(t.coverage*100)}% of damage`:'No coverage'}</div></div>
    </button>`;
  });
  html += `</div><button class="modal-btn secondary" onclick="showGarage()">← Back</button>`;
  openModal(html);
}

function setInsurance(i, tierId, premium) {
  const v = G.vehicles[i];
  if(!v) return;
  v.insurance = tierId;
  v.insurance_premium = premium;
  addLog(`🛡️ ${v.brand} ${v.model} now on ${CAR_INSURANCE_TIERS.find(t=>t.id===tierId).label} (${fmt$(premium)}/yr)`, "info");
  closeModal(); render();

function prestigeTierLabel(p) {
  if(p>=88) return { label:'Elite (Ivy+)', color:'var(--yellow)' };
  if(p>=72) return { label:'Target School', color:'var(--accent2)' };
  if(p>=50) return { label:'Semi-Target', color:'var(--accent)' };
  if(p>=30) return { label:'Non-Target', color:'var(--muted)' };
  return { label:'No Degree', color:'var(--red)' };
}

function showConsulting() {
  const prestige = getPrestigeScore();
  const tier = prestigeTierLabel(prestige);
  const isConsultant = G.consulting_firm !== null;

  let html = `<h2>📊 Consulting</h2>`;
  html += `<div class="result-card" style="border-left-color:${tier.color}">
    <div class="rc-title">School Prestige Score: <span style="color:${tier.color}">${prestige}/100</span></div>
    <div class="rc-body">
      ${G.college ? G.college.name : 'No college'} ${G.grad_school ? '+ '+G.grad_school : ''}<br>
      <span style="color:${tier.color}">${tier.label}</span> — ${prestige>=88?'MBB-eligible':prestige>=72?'Tier 2 firms accessible':prestige>=50?'Big 4 & Tier 3 accessible':prestige>=30?'Boutiques & small firms':'Extremely limited access'}

    html += `<div class="result-card good">
      <div class="rc-title">💼 ${G.consulting_firm}</div>
      <div class="rc-body">${CONSULTING_BRANCHES[G.consulting_branch].label} · ${fmt$(G.salary)}/yr · Performance: ${G.job_performance}/100</div>

      <button class="modal-opt" onclick="workHarder()"><span class="opt-icon">💪</span><div><div class="opt-label">Bill More Hours</div><div class="opt-desc">Boost performance → chance of raise or promotion</div></div></button>
      <button class="modal-opt" onclick="askRaise()"><span class="opt-icon">💵</span><div><div class="opt-label">Negotiate Compensation</div><div class="opt-desc">Leverage your billable track record</div></div></button>
      <button class="modal-opt" onclick="switchConsultingBranch()"><span class="opt-icon">🔀</span><div><div class="opt-label">Switch Practice Area</div><div class="opt-desc">Move to a different consulting branch</div></div></button>
      <button class="modal-opt" onclick="quitJob()"><span class="opt-icon">🚪</span><div><div class="opt-label">Exit to Industry</div><div class="opt-desc">Leave consulting for a corporate role</div></div></button>
    </div>`;
  } else {
    html += `<div class="modal-sub">Choose a practice area to interview for:</div><div id="modal-options">`;
    Object.entries(CONSULTING_BRANCHES).forEach(([key, branch]) => {
      const eligible = branch.firms.filter(f => prestige >= f.minPrestige);
      const topFirm = eligible[0];
      const locked = eligible.length === 0;
      const minNeeded = Math.min(...branch.firms.map(f=>f.minPrestige));
      html += `<button class="modal-opt" ${locked?'style="opacity:0.4" disabled':''} onclick="${locked?'':` startConsultingInterview('${key}')`}">

        <div>

function switchConsultingBranch() {
  G.consulting_firm = null;
  G.consulting_branch = null;
  G.job = null;
  G.salary = 0;
  addLog("🔀 Left your consulting firm to switch practice areas", "info");
  showConsulting();
}

function startConsultingInterview(branchKey) {
  G.interview_branch = branchKey;
  G.interview_step = 0;
  G.interview_score = 0;
  runConsultingInterview();
}

function runConsultingInterview() {
  const branch = CONSULTING_BRANCHES[G.interview_branch];
  const qs = CONSULTING_INTERVIEW_QS[G.interview_branch];
  const step = G.interview_step;

  if(step >= qs.length) {
    finishConsultingInterview();
    return;
  }

  const q = qs[step];
  const prestige = getPrestigeScore();
  openModal(`
    <h2>${branch.emoji} ${branch.label} Interview</h2>
    <div class="modal-sub">Question ${step+1} of ${qs.length} &nbsp;·&nbsp; Score: ${G.interview_score} pts &nbsp;·&nbsp; Prestige: ${prestige}/100</div>
    <div style="background:var(--surface2);border-left:3px solid var(--accent2);border-radius:8px;padding:12px;margin-bottom:12px;font-size:0.82rem;line-height:1.55;color:var(--text)">${q.q}</div>
    <div id="modal-options">
      ${q.opts.map((o,i) => `<button class="modal-opt" onclick="answerConsultingQ(${i})">
        <span class="opt-icon">${i===0?'🧠':i===1?'🤔':'😬'}</span>
        <div><div class="opt-label" style="font-size:0.76rem;font-weight:500;line-height:1.4">${o.t}</div></div>
      </button>`).join('')}
    </div>
  `);
}

function answerConsultingQ(idx) {
  const qs = CONSULTING_INTERVIEW_QS[G.interview_branch];
  const q = qs[G.interview_step];
  const chosen = q.opts[idx];
  G.interview_score += chosen.pts;
  G.interview_step++;
  runConsultingInterview();
}

function finishConsultingInterview() {
  const branch = CONSULTING_BRANCHES[G.interview_branch];
  const qs = CONSULTING_INTERVIEW_QS[G.interview_branch];
  const maxScore = qs.reduce((s,q) => s + Math.max(...q.opts.map(o=>o.pts)), 0);
  const rawPct = G.interview_score / maxScore; // 0–1

  const prestige = getPrestigeScore();
  // Prestige is the gatekeeper: it determines which firms you CAN get
  // Interview performance determines which one you actually land within eligible set
  const eligibleFirms = branch.firms.filter(f => prestige >= f.minPrestige);
  // Smarts and interview performance together pick the firm within the eligible set
  const smartsFactor = G.smarts / 100;
  const interviewFactor = rawPct;
  const combinedScore = interviewFactor * 0.6 + smartsFactor * 0.25 + Math.random() * 0.15;

  let placed = null;
  if(combinedScore >= 0.82 && eligibleFirms.length >= 1) placed = eligibleFirms[0];
  else if(combinedScore >= 0.65 && eligibleFirms.length >= 2) placed = eligibleFirms[1];
  else if(combinedScore >= 0.48 && eligibleFirms.length >= 3) placed = eligibleFirms[2];
  else if(combinedScore >= 0.32 && eligibleFirms.length >= 1) placed = eligibleFirms[eligibleFirms.length-1];

  const pts = G.interview_score;
  G.interview_branch = null; G.interview_step = 0; G.interview_score = 0;

  if(placed) {
    const salary = rand(placed.baseSalary, placed.topSalary);
    // Bonus: elite school bonus on top
    const prestigeBonus = prestige >= 88 ? Math.round(salary * 0.12) : prestige >= 72 ? Math.round(salary * 0.06) : 0;
    const finalSalary = salary + prestigeBonus;
    G.job = `${placed.name}`;
    G.consulting_firm = placed.name;
    G.consulting_branch = Object.keys(CONSULTING_BRANCHES).find(k => CONSULTING_BRANCHES[k] === branch);
    G.ib_bank = null; G.ib_division = null; G.eng_firm = null; G.eng_sector = null; G.acad_firm = null; G.acad_field = null;
    G.salary = finalSalary;
    G.job_years = 0;
    G.job_performance = clamp(Math.round(rawPct * 80 + 20), 30, 95);
    G.happiness = clamp(G.happiness + 18, 5, 100);
    addLog(`🎉 Offer from ${placed.name} (${placed.tier})! ${fmt$(finalSalary)}/yr`, "special");
    openModal(`
      <h2>🎉 Offer Received!</h2>
      <div class="result-card special">
        <div class="rc-title">${placed.emoji} ${placed.name}</div>
        <div class="rc-body">
          ${branch.label} · ${placed.tier} tier<br>
          Starting salary: <b>${fmt$(finalSalary)}/yr</b>${prestigeBonus>0?` (includes ${fmt$(prestigeBonus)} prestige bonus)`:''}
        </div>
      </div>
      <div class="result-card">
        <div class="rc-title">Your scorecard</div>
        <div class="rc-body">
          Interview: ${pts}/${maxScore} pts · School prestige: ${prestige}/100<br>
          Smarts: ${G.smarts}/100 · Overall fit: ${Math.round(combinedScore*100)}%
        </div>
      </div>
      <button class="modal-btn" onclick="closeModal();render()">Accept Offer 🚀</button>
    `);
  } else {
    addLog(`❌ No consulting offer this cycle. Prestige: ${prestige}, Interview: ${pts}/${maxScore}`, "bad");
    openModal(`
      <h2>❌ No Offer</h2>
      <div class="result-card bad">
        <div class="rc-title">Ding'd from ${branch.label}</div>
        <div class="rc-body">
          Interview score: ${pts}/${maxScore} pts<br>
          School prestige: ${prestige}/100<br>
          ${prestige < 50 ? '⚠️ A more prestigious school or grad degree would open significantly more doors.' :
            pts/maxScore < 0.5 ? '💡 Your case interview skills need work. Try practicing frameworks.' :
            '💡 So close — sharpen your smarts and try again next year.'}
        </div>
      </div>
      <button class="modal-btn secondary" onclick="closeModal();render()">Close</button>
    `);
  }
}

function ibRunInterview() {
  const round = G.ib_interview_round;
  if(round >= IB_INTERVIEW_ROUNDS.length) { ibFinishInterview(); return; }
  const r = IB_INTERVIEW_ROUNDS[round];
  const bank = IB_BANKS.find(b=>b.name===G.ib_target_bank);
  const prestige = getPrestigeScore();
  const qIdx = Math.floor((G.ib_interview_scores.length) % r.questions.length);
  // Show one question per round screen; track within round
  const roundScore = G.ib_interview_scores[round] || 0;
  const questionsAnswered = G.ib_interview_scores.filter((_,i)=>i<round).length;

  // Build round questions tracker
  if(!G._ib_round_q) G._ib_round_q = 0;
  const q = r.questions[G._ib_round_q];

  openModal(`
    <h2>${r.emoji} ${r.name}</h2>
    <div class="modal-sub">${bank?.name} — ${IB_DIVISIONS[G.ib_target_division]?.label}<br>Question ${G._ib_round_q+1} of ${r.questions.length} · Prestige: ${prestige}/100</div>
    <div style="background:var(--surface2);border-left:3px solid var(--yellow);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:0.82rem;line-height:1.55;color:var(--text)"><b>${q.q}</b></div>
    <div id="modal-options">
      ${q.opts.map((o,i)=>`<button class="modal-opt" onclick="ibAnswerQ(${i})">
        <span class="opt-icon">${i===0?'🎯':i===1?'🤔':'😅'}</span>
        <div><div class="opt-label" style="font-size:0.76rem;font-weight:500;line-height:1.45">${o.t}</div></div>
      </button>`).join('')}
    </div>
  `);
}

function ibAnswerQ(idx) {
  const round = G.ib_interview_round;
  const r = IB_INTERVIEW_ROUNDS[round];
  const q = r.questions[G._ib_round_q];
  const pts = q.opts[idx].pts;

  if(!G._ib_round_scores) G._ib_round_scores = [];
  G._ib_round_scores.push(pts);
  G._ib_round_q++;

  if(G._ib_round_q >= r.questions.length) {
    // Round complete
    const roundTotal = G._ib_round_scores.reduce((a,b)=>a+b,0);
    const roundMax = r.questions.reduce((s,q)=>s+Math.max(...q.opts.map(o=>o.pts)),0);
    G.ib_interview_scores[round] = roundTotal;
    G.ib_interview_round++;
    G._ib_round_q = 0;
    G._ib_round_scores = [];

    if(G.ib_interview_round < IB_INTERVIEW_ROUNDS.length) {
      const pct = Math.round(roundTotal/roundMax*100);
      const nextR = IB_INTERVIEW_ROUNDS[G.ib_interview_round];
      openModal(`
        <h2>${pct>=80?'✅':'⚠️'} Round ${round+1} Complete</h2>
        <div class="result-card ${pct>=80?'good':pct>=55?'':'bad'}">
          <div class="rc-title">${IB_INTERVIEW_ROUNDS[round].name}</div>
          <div class="rc-body">Score: ${roundTotal}/${roundMax} (${pct}%) ${pct>=80?'🔥 Strong':pct>=55?'🙂 Decent':'❌ Weak'}</div>
        </div>
        <div class="modal-sub">Next: ${nextR.emoji} ${nextR.name}<br>${nextR.desc}</div>
        <button class="modal-btn" onclick="ibRunInterview()">Continue to Next Round →</button>
      `);
    } else {
      ibFinishInterview();
    }
  } else {
    ibRunInterview();
  }
}

function ibFinishInterview() {
  const bank = IB_BANKS.find(b=>b.name===G.ib_target_bank);
  const div = IB_DIVISIONS[G.ib_target_division];
  const prestige = getPrestigeScore();

  // Score all rounds
  const scores = G.ib_interview_scores;
  const maxScores = IB_INTERVIEW_ROUNDS.map(r=>r.questions.reduce((s,q)=>s+Math.max(...q.opts.map(o=>o.pts)),0));
  const totalScore = scores.reduce((a,b)=>a+(b||0),0);
  const totalMax = maxScores.reduce((a,b)=>a+b,0);
  const interviewPct = totalScore/totalMax;

  // Prestige is a hard gate (already filtered in UI), determines bonus to score
  const prestigeBonus = prestige>=88?0.25:prestige>=80?0.18:prestige>=70?0.10:prestige>=55?0.04:0;
  const smartsBonus = G.smarts/100*0.12;
  const finalScore = interviewPct*0.63 + prestigeBonus + smartsBonus + Math.random()*0.05;

  const roundResults = IB_INTERVIEW_ROUNDS.map((r,i)=>{
    const s = scores[i]||0; const m = maxScores[i];
    const p = Math.round(s/m*100);
    return `${r.emoji} ${r.name}: ${s}/${m} (${p}%)`;
  });

  G.ib_target_bank = null; G.ib_target_division = null;
  G._ib_round_q = 0; G._ib_round_scores = [];
  G.ib_interview_round = 0; G.ib_interview_scores = [];

  if(!bank) { closeModal(); render(); return; }

  if(finalScore >= 0.52) {
    const baseSalary = rand(bank.baseSalary, bank.topSalary);
    const divBaseSalary = Math.round(baseSalary * div.salaryMult);
    const bonus = Math.round(rand(bank.bonus[0], bank.bonus[1]) * div.bonusMult);
    const prestigeSalaryBonus = prestige>=88 ? Math.round(divBaseSalary*0.10) : prestige>=80 ? Math.round(divBaseSalary*0.05) : 0;
    const finalBase = divBaseSalary + prestigeSalaryBonus;

    G.ib_bank = bank.name;
    G.ib_division = Object.keys(IB_DIVISIONS).find(k=>IB_DIVISIONS[k]===div);
    G.ib_level = 0;
    G.ib_base_salary = finalBase;
    G.ib_bonus = bonus;
    G.salary = finalBase;
    G.job = `Analyst, ${div.label} — ${bank.name}`;
    G.job_years = 0;
    G.job_performance = clamp(Math.round(interviewPct*75+25), 30, 90);
    G.consulting_firm = null; G.consulting_branch = null; G.eng_firm = null; G.eng_sector = null; G.acad_firm = null; G.acad_field = null;
    G.happiness = clamp(G.happiness+20, 5, 100);
    addLog(`🏦 Offer from ${bank.name} (${bank.tier})! Base: ${fmt$(finalBase)}, Target bonus: ${fmt$(bonus)}`, "special");

    openModal(`
      <h2>🎉 Offer Letter!</h2>
      <div class="result-card special">
        <div class="rc-title">${bank.emoji} ${bank.name} — ${bank.tier}</div>
        <div class="rc-body">
          ${div.label}<br>
          <b>Base salary: ${fmt$(finalBase)}/yr</b>${prestigeSalaryBonus>0?` (includes ${fmt$(prestigeSalaryBonus)} prestige premium)`:''}<br>
          <b>Target bonus: ${fmt$(bonus)}</b><br>
          Title: Analyst · Total comp year 1: ~${fmt$(finalBase+Math.round(bonus*0.6))} after-tax
        </div>
      </div>
      <div class="result-card">
        <div class="rc-title">Interview Scorecard</div>
        <div class="rc-body">${roundResults.join('<br>')}<br>School prestige: ${prestige}/100 · Overall: ${Math.round(finalScore*100)}%</div>
      </div>
      <button class="modal-btn" onclick="closeModal();render()">Accept Offer 🚀</button>
    `);
  } else {
    addLog(`❌ No offer from ${bank.name}. Interview score: ${totalScore}/${totalMax}`, "bad");
    openModal(`
      <h2>❌ No Offer</h2>
      <div class="result-card bad">
        <div class="rc-title">Ding from ${bank.name}</div>
        <div class="rc-body">
          ${roundResults.join('<br>')}<br><br>
          ${interviewPct<0.45?'💡 Technical skills need serious work — study accounting and valuation.':
            prestige<62?'⚠️ School prestige is limiting your candidacy significantly.':
            '💡 So close — stronger behavioral answers and market knowledge would help.'}
        </div>
      </div>
      <button class="modal-btn secondary" onclick="closeModal();render()">Close</button>
    `);
  }
}

// IB in-role actions
function ibWorkDeal() {
  const effort = rand(1,3);
  G.job_performance = clamp(G.job_performance+rand(4,10), 0, 100);
  G.health = clamp(G.health-rand(2,6), 1, 100);
  G.happiness = clamp(G.happiness-rand(1,4), 5, 100);
  if(Math.random()<0.4) {
    G.ib_deals_closed = (G.ib_deals_closed||0)+1;
    const dealBonus = rand(5000,30000);
    G.bank += dealBonus;
    addLog(`📋 Closed a deal! Deal bonus: ${fmt$(dealBonus)} · Deals closed: ${G.ib_deals_closed}`, "special");
  } else {
    addLog(`📋 Worked 100-hour week on a live deal. Performance +${effort*3}. Exhausted.`, "good");
  }
  closeModal(); render();
}

function ibNetworkMD() {
  G.job_performance = clamp(G.job_performance+rand(3,8), 0, 100);
  G.happiness = clamp(G.happiness+rand(2,5), 5, 100);
  G.bank -= rand(100,400); // dinners, drinks
  addLog(`🤝 Networked with senior bankers. Building internal profile. Performance +5.`, "good");
  closeModal(); render();
}

function ibPitchClient() {
  const success = Math.random() < (G.job_performance/100*0.55+0.15);
  if(success) {
    const bonus = rand(15000,80000);
    G.bank += bonus;
    G.job_performance = clamp(G.job_performance+rand(5,12), 0, 100);
    G.ib_bonus = Math.round(G.ib_bonus * 1.15);
    addLog(`📊 Won new client mandate! Pitch bonus: ${fmt$(bonus)} · Year-end bonus increased 15%!`, "special");
  } else {
    G.job_performance = clamp(G.job_performance-rand(2,6), 0, 100);
    addLog(`📊 Lost the pitch. Competitor won the mandate. Back to the drawing board.`, "bad");
  }
  closeModal(); render();
}

function ibNegotiateBonus() {
  if(G.job_performance >= 70) {
    const bump = Math.round(G.ib_bonus * randF(0.08, 0.25));
    G.ib_bonus += bump;
    addLog(`💵 Bonus negotiation successful! +${fmt$(bump)} to year-end bonus → ${fmt$(G.ib_bonus)} target`, "money");
  } else {
    addLog(`❌ Bonus negotiation denied. Performance (${G.job_performance}) not strong enough — need 70+.`, "bad");
  }
  closeModal(); render();
}

function ibExitOpportunity() {
  const level = IB_LEVELS[G.ib_level||0];
  const exits = [
    { title:"Private Equity (Mega Fund)", req:"Associate+", minYears:2, salaryBoost:2.2, emoji:"🏦", desc:"KKR, Blackstone, Apollo, Carlyle" },
    { title:"Hedge Fund Analyst",         req:"Analyst",    minYears:1, salaryBoost:1.8, emoji:"📈", desc:"Citadel, Bridgewater, Two Sigma" },
    { title:"Corporate Development",      req:"Analyst",    minYears:1, salaryBoost:1.3, emoji:"🏢", desc:"Fortune 500 M&A team. Better hours." },
    { title:"Venture Capital",            req:"Associate+", minYears:2, salaryBoost:1.5, emoji:"🚀", desc:"Sequoia, a16z, Bessemer. Exciting sector." },
    { title:"MBA (Top Program)",          req:"Analyst",    minYears:2, salaryBoost:0,   emoji:"🎓", desc:"Go get your MBA to accelerate career." },
  ];
  let html = `<h2>🚀 Exit Opportunities</h2>
    <div class="modal-sub">After ${G.job_years} yrs as ${level.title} at ${G.ib_bank}</div>
    <div id="modal-options">`;
  exits.forEach(e=>{
    const eligible = G.job_years >= e.minYears;
    const newSalary = Math.round(G.salary * e.salaryBoost);
    html += `<button class="modal-opt" ${eligible?'':`style="opacity:0.4" disabled`} onclick="${eligible?`ibTakeExit('${e.title}',${e.salaryBoost})`:''}">
      <span class="opt-icon">${e.emoji}</span>
      <div>
        <div class="opt-label">${e.title}</div>
        <div class="opt-desc">${e.desc}<br>${eligible?`Est. comp: ${fmt$(newSalary)}/yr`:`Need ${e.minYears}+ years in IB`}</div>
      </div>
    </button>`;
  });
  html += `</div>`;
  openModal(html);
}

function ibTakeExit(title, salaryBoost) {
  const newSalary = Math.round(G.salary * salaryBoost);
  const oldBank = G.ib_bank;
  G.ib_bank = null; G.ib_division = null; G.ib_level = 0; G.ib_bonus = 0;
  G.job = title;
  G.salary = newSalary;
  G.job_years = 0;
  G.job_performance = 60;
  addLog(`🚀 Exited ${oldBank} to join ${title}. New comp: ${fmt$(newSalary)}/yr`, "special");
  G.happiness = clamp(G.happiness+15, 5, 100);
  closeModal(); render();
}

function quitIB() {
  addLog(`🚪 Left ${G.ib_bank}`, "info");
  G.ib_bank = null; G.ib_division = null; G.ib_level = 0; G.ib_base_salary = 0; G.ib_bonus = 0;
  G.job = null; G.salary = 0;
  G.happiness = clamp(G.happiness-5, 5, 100);
  closeModal(); render();
}

function calcEngSkillSalaryBoost() {
  const skills = G.eng_skills || [];
  return skills.reduce((sum, id) => {
    const s = ENG_SKILLS.find(x => x.id === id);
    return sum + (s ? s.salaryBoost : 0);
  }, 0);
}

function calcEngSkillAccessScore() {
  const skills = G.eng_skills || [];
  return skills.reduce((sum, id) => {
    const s = ENG_SKILLS.find(x => x.id === id);
    return sum + (s ? s.accessBoost : 0);
  }, 0);
}

function engPrestigeTierLabel(p) {
  if(p >= 80) return { label:'Elite Research University', color:'var(--yellow)' };
  if(p >= 65) return { label:'Strong Engineering School', color:'var(--accent2)' };
  if(p >= 48) return { label:'Solid State School', color:'var(--accent)' };
  if(p >= 30) return { label:'Regional University', color:'var(--muted)' };
  return { label:'Community College / No Degree', color:'var(--red)' };
}

function showEngineering() {
  const prestige   = getPrestigeScore();
  const skillScore = calcEngSkillAccessScore();
  const salaryBoost= calcEngSkillSalaryBoost();
  const tier       = engPrestigeTierLabel(prestige);
  const inEng      = !!G.eng_firm;

  let html = `<h2>⚙️ Engineering Career</h2>`;

  // Profile card
  html += `<div class="result-card" style="border-left-color:${tier.color}">
    <div class="rc-title">Engineering Profile</div>
    <div class="rc-body">
      School prestige: <b style="color:${tier.color}">${prestige}/100 — ${tier.label}</b><br>
      Software skill score: <b style="color:var(--green)">${skillScore} pts</b> (${(G.eng_skills||[]).length} tools mastered)<br>
      Skill salary bonus: <b style="color:var(--yellow)">+${Math.round(salaryBoost*100)}%</b>
      ${G.eng_pe_license ? '<br><span style="color:var(--green)">✅ PE Licensed — unlocks senior firm access</span>' : ''}
    </div>
  </div>`;

  if(inEng) {
    const level = ENG_LEVELS[G.eng_level || 0];
    const sector = ENG_SECTORS[G.eng_sector];
    html += `<div class="result-card good">
      <div class="rc-title">⚙️ ${G.eng_firm}</div>
      <div class="rc-body">
        ${level.title}${sector ? ' · ' + sector.label : ''}${G.eng_discipline ? ' · ' + G.eng_discipline : ''}<br>
        Base: ${fmt$(G.eng_base_salary)}/yr · Total w/skills: ${fmt$(G.salary)}/yr<br>
        Performance: ${G.job_performance}/100 · Projects: ${G.eng_projects_completed || 0}
      </div>
    </div>`;
    html += `<div id="modal-options">
      <button class="modal-opt" onclick="engLearnSkills()"><span class="opt-icon">🖥️</span><div><div class="opt-label">Learn Engineering Software</div><div class="opt-desc">${(G.eng_skills||[]).length} tools learned — each boosts salary 5–15%</div></div></button>
      <button class="modal-opt" onclick="engWorkProject()"><span class="opt-icon">📐</span><div><div class="opt-label">Work on a Major Project</div><div class="opt-desc">+performance, chance of recognition & raise</div></div></button>
      <button class="modal-opt" onclick="engPursueAdvanced()"><span class="opt-icon">🎓</span><div><div class="opt-label">Pursue Advanced Certification</div><div class="opt-desc">PE License, PMP, Six Sigma — big salary jumps</div></div></button>
      <button class="modal-opt" onclick="engNegotiateSalary()"><span class="opt-icon">💵</span><div><div class="opt-label">Negotiate Salary</div><div class="opt-desc">Use your skills & performance to negotiate up</div></div></button>
      <button class="modal-opt" onclick="engChangeFirm()"><span class="opt-icon">🔀</span><div><div class="opt-label">Switch Firm / Sector</div><div class="opt-desc">Jump ship — engineering talent is in demand</div></div></button>
      <button class="modal-opt" onclick="quitEngineering()"><span class="opt-icon">🚪</span><div><div class="opt-label">Leave Engineering</div><div class="opt-desc">Exit to management, consulting, or academia</div></div></button>
    </div>`;
  } else {
    html += `<div class="modal-sub">Choose a sector — prestige + software skills determine which firms you can access:</div>`;
    const sectors = Object.keys(ENG_SECTORS);
    html += `<div id="modal-options">`;
    sectors.forEach(key => {
      const sector = ENG_SECTORS[key];
      const accessible = sector.firms.filter(f => prestige >= f.minPrestige && skillScore >= f.minSkillScore);
      const locked = sector.firms.length - accessible.length;
      const minPres = Math.min(...sector.firms.map(f => f.minPrestige));
      const minSkill = Math.min(...sector.firms.map(f => f.minSkillScore));
      const noAccess = accessible.length === 0;
      html += `<button class="modal-opt" ${noAccess ? 'style="opacity:0.4" disabled' : ''} onclick="${noAccess ? '' : `engSelectSector('${key}')`}">
        <span class="opt-icon">${sector.emoji}</span>
        <div>
          <div class="opt-label">${sector.label}</div>
          <div class="opt-desc">${noAccess
            ? `Need prestige ${minPres}+ and skill score ${minSkill}+`
            : `${accessible.length}/${sector.firms.length} firms accessible · Top: ${accessible[0]?.name}`
          }</div>
        </div>
      </button>`;
    });
    html += `</div>`;
    html += `<button class="modal-btn secondary" style="margin-top:10px" onclick="engLearnSkillsStandalone()">🖥️ Learn Engineering Software First</button>`;
  }
  openModal(html);
}

function engSelectSector(sectorKey) {
  const sector = ENG_SECTORS[sectorKey];
  const prestige = getPrestigeScore();
  const skillScore = calcEngSkillAccessScore();
  const accessible = sector.firms.filter(f => prestige >= f.minPrestige && skillScore >= f.minSkillScore);

  let html = `<h2>${sector.emoji} ${sector.label}</h2>
    <div class="modal-sub">${sector.desc}</div>
    <div class="modal-section"><h3>Choose Your Discipline</h3>
    <div id="modal-options" style="margin-bottom:12px">`;
  sector.disciplines.forEach(d => {
    html += `<button class="modal-opt" onclick="engSelectDisciplineAndFirm('${sectorKey}','${d.replace(/'/g,"\\'")}')">
      <span class="opt-icon">📐</span><div><div class="opt-label">${d}</div></div>
    </button>`;
  });
  html += `</div></div>`;
  html += `<button class="modal-btn secondary" onclick="showEngineering()">← Back</button>`;
  openModal(html);
}

function engSelectDisciplineAndFirm(sectorKey, discipline) {
  const sector = ENG_SECTORS[sectorKey];
  const prestige = getPrestigeScore();
  const skillScore = calcEngSkillAccessScore();
  const salaryBoost = calcEngSkillSalaryBoost();
  const accessible = sector.firms.filter(f => prestige >= f.minPrestige && skillScore >= f.minSkillScore);
  const locked = sector.firms.filter(f => prestige < f.minPrestige || skillScore < f.minSkillScore);

  G.eng_target_sector = sectorKey;

  let html = `<h2>${sector.emoji} ${discipline}</h2>
    <div class="modal-sub">${sector.label} · Prestige: ${prestige} · Skill score: ${skillScore}</div>
    <div id="modal-options">`;

  accessible.forEach(firm => {
    const estSalary = Math.round(rand(firm.baseSalary, firm.topSalary) * (1 + salaryBoost));
    html += `<button class="modal-opt" onclick="engStartInterview('${sectorKey}','${firm.name.replace(/'/g,"\\'")}','${discipline.replace(/'/g,"\\'")}')">
      <span class="opt-icon">${firm.emoji}</span>
      <div>
        <div class="opt-label">${firm.name} <span style="font-size:0.62rem;color:var(--muted)">${firm.tier}</span></div>
        <div class="opt-desc">Est. ${fmt$(firm.baseSalary)}–${fmt$(firm.topSalary)}/yr base · +${Math.round(salaryBoost*100)}% skill premium → ~${fmt$(estSalary)}</div>
      </div>
    </button>`;
  });

  if(locked.length > 0) {
    html += `<div style="font-size:0.68rem;color:var(--muted);padding:8px 4px;margin-top:4px">🔒 ${locked.length} firms locked — need higher prestige or more skills:</div>`;
    locked.slice(0,3).forEach(f => {
      const needs = [];
      if(prestige < f.minPrestige) needs.push(`prestige ${f.minPrestige}+`);
      if(skillScore < f.minSkillScore) needs.push(`skill score ${f.minSkillScore}+`);
      html += `<button class="modal-opt" style="opacity:0.35" disabled>
        <span class="opt-icon">${f.emoji}</span>
        <div><div class="opt-label">${f.name}</div><div class="opt-desc">Requires: ${needs.join(' and ')}</div></div>
      </button>`;
    });
  }
  html += `</div><button class="modal-btn secondary" onclick="engSelectSector('${sectorKey}')">← Back</button>`;
  openModal(html);
}

function engStartInterview(sectorKey, firmName, discipline) {
  G.eng_target_sector = sectorKey;
  G.eng_target_firm = firmName;
  G.eng_discipline = discipline;
  G.eng_interview_step = 0;
  G.eng_interview_score = 0;
  engRunInterview();
}

function engRunInterview() {
  const qs = ENG_INTERVIEW_QS[G.eng_target_sector] || ENG_INTERVIEW_QS.civil;
  const step = G.eng_interview_step;
  if(step >= qs.length) { engFinishInterview(); return; }
  const q = qs[step];
  const prestige = getPrestigeScore();
  const skillScore = calcEngSkillAccessScore();
  const firmName = G.eng_target_firm;
  const sectorLabel = ENG_SECTORS[G.eng_target_sector]?.label || '';

  openModal(`
    <h2>⚙️ ${sectorLabel} Interview</h2>
    <div class="modal-sub">${firmName} · Question ${step+1} of ${qs.length}<br>Prestige: ${prestige}/100 · Skill score: ${skillScore} pts</div>
    <div style="background:var(--surface2);border-left:3px solid var(--orange);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:0.82rem;line-height:1.55"><b>${q.q}</b></div>
    <div id="modal-options">
      ${q.opts.map((o,i) => `<button class="modal-opt" onclick="engAnswerQ(${i})">
        <span class="opt-icon">${i===0 ? '🎯' : i===1 ? '🤔' : '😬'}</span>
        <div><div class="opt-label" style="font-size:0.76rem;font-weight:500;line-height:1.45">${o.t}</div></div>
      </button>`).join('')}
    </div>
  `);
}

function engAnswerQ(idx) {
  const qs = ENG_INTERVIEW_QS[G.eng_target_sector] || ENG_INTERVIEW_QS.civil;
  const q = qs[G.eng_interview_step];
  G.eng_interview_score += q.opts[idx].pts;
  G.eng_interview_step++;
  engRunInterview();
}

function engFinishInterview() {
  const qs = ENG_INTERVIEW_QS[G.eng_target_sector] || ENG_INTERVIEW_QS.civil;
  const maxScore = qs.reduce((s, q) => s + Math.max(...q.opts.map(o => o.pts)), 0);
  const interviewPct = G.eng_interview_score / maxScore;

  const prestige = getPrestigeScore();
  const skillScore = calcEngSkillAccessScore();
  const salaryBoost = calcEngSkillSalaryBoost();
  const sector = ENG_SECTORS[G.eng_target_sector];
  const firm = sector?.firms.find(f => f.name === G.eng_target_firm);

  // Scoring: interview 55% + prestige 25% + skills 20%
  const prestigeNorm = Math.min(prestige / 100, 1);
  const skillNorm = Math.min(skillScore / 60, 1);
  const combined = interviewPct * 0.55 + prestigeNorm * 0.25 + skillNorm * 0.20 + Math.random() * 0.05;

  const score = G.eng_interview_score;
  G.eng_target_firm = null; G.eng_target_sector = null;
  G.eng_interview_step = 0; G.eng_interview_score = 0;

  if(!firm) { closeModal(); render(); return; }

  if(combined >= 0.42) {
    const baseSalary = rand(firm.baseSalary, firm.topSalary);
    const prestigeBonus = prestige >= 80 ? Math.round(baseSalary * 0.10) :
                          prestige >= 65 ? Math.round(baseSalary * 0.06) :
                          prestige >= 48 ? Math.round(baseSalary * 0.02) : 0;
    const skillBoostedSalary = Math.round((baseSalary + prestigeBonus) * (1 + salaryBoost));

    G.eng_firm = firm.name;
    G.eng_sector = Object.keys(ENG_SECTORS).find(k => ENG_SECTORS[k] === sector);
    G.eng_level = 0;
    G.eng_base_salary = baseSalary + prestigeBonus;
    G.salary = skillBoostedSalary;
    G.job = `Engineer I — ${firm.name}`;
    G.job_years = 0;
    G.job_performance = clamp(Math.round(interviewPct * 70 + 30), 30, 90);
    G.ib_bank = null; G.ib_division = null;
    G.consulting_firm = null; G.consulting_branch = null;
    G.acad_firm = null; G.acad_field = null;
    G.happiness = clamp(G.happiness + 15, 5, 100);
    addLog(`⚙️ Hired at ${firm.name} (${firm.tier})! ${fmt$(skillBoostedSalary)}/yr`, "special");

    openModal(`
      <h2>✅ Offer Letter!</h2>
      <div class="result-card special">
        <div class="rc-title">${firm.emoji} ${firm.name} — ${firm.tier}</div>
        <div class="rc-body">
          ${sector.label} · ${G.eng_discipline}<br>
          Base salary: <b>${fmt$(baseSalary + prestigeBonus)}/yr</b>${prestigeBonus > 0 ? ` (${fmt$(prestigeBonus)} prestige premium)` : ''}<br>
          With skill bonus (+${Math.round(salaryBoost*100)}%): <b>${fmt$(skillBoostedSalary)}/yr</b>
        </div>
      </div>
      <div class="result-card">
        <div class="rc-title">Scorecard</div>
        <div class="rc-body">Interview: ${score}/${maxScore} · Prestige: ${prestige}/100 · Skill score: ${skillScore} pts</div>
      </div>
      <button class="modal-btn" onclick="closeModal();render()">Accept Offer 🚀</button>
    `);
  } else {
    addLog(`❌ No offer from ${firm.name}. Interview: ${score}/${maxScore}`, "bad");
    openModal(`
      <h2>❌ No Offer</h2>
      <div class="result-card bad">
        <div class="rc-title">Rejected from ${firm.name}</div>
        <div class="rc-body">
          Interview: ${score}/${maxScore} (${Math.round(interviewPct*100)}%)<br>
          ${interviewPct < 0.45 ? '💡 Brush up on your technical fundamentals.' :
            skillScore < firm.minSkillScore * 1.5 ? '🖥️ Learn more engineering software tools — they matter a lot here.' :
            prestige < 60 ? '⚠️ School prestige is a factor. A grad degree could help.' :
            '💡 Close — keep working on projects and come back next year.'}
        </div>
      </div>
      <button class="modal-btn secondary" onclick="closeModal();render()">Close</button>
    `);
  }
}

// Engineering skill learning
function engLearnSkills() { _engLearnSkillsModal(true); }
function engLearnSkillsStandalone() { _engLearnSkillsModal(false); }
function _engLearnSkillsModal(fromDashboard) {
  const learned = G.eng_skills || [];
  const salaryBoost = calcEngSkillSalaryBoost();
  const skillScore  = calcEngSkillAccessScore();
  const categories  = [...new Set(ENG_SKILLS.map(s => s.category))];

  let html = `<h2>🖥️ Engineering Software & Skills</h2>
    <div class="modal-sub">Learned: ${learned.length}/${ENG_SKILLS.length} · Skill score: ${skillScore} pts · Salary bonus: +${Math.round(salaryBoost*100)}%</div>`;

  categories.forEach(cat => {
    const catSkills = ENG_SKILLS.filter(s => s.category === cat);
    html += `<div class="modal-section"><h3>${cat}</h3>`;
    catSkills.forEach(skill => {
      const has = learned.includes(skill.id);
      html += `<button class="modal-opt" ${has ? 'style="border-color:var(--green)"' : ''} onclick="${has ? '' : `engLearnSkill('${skill.id}')`}" ${has ? 'disabled' : ''}>
        <span class="opt-icon">${skill.emoji}</span>
        <div>
          <div class="opt-label">${skill.label}${has ? ' ✅' : ''}</div>
          <div class="opt-desc">${skill.desc}<br>
          <span style="color:var(--green)">+${Math.round(skill.salaryBoost*100)}% salary</span> · 
          <span style="color:var(--accent2)">+${skill.accessBoost} access pts</span>
          ${has ? '' : ' · <span style="color:var(--yellow)">Cost: $500 + 3 smarts</span>'}
          </div>
        </div>
      </button>`;
    });
    html += `</div>`;
  });
  openModal(html);
}

function engLearnSkill(id) {
  const skill = ENG_SKILLS.find(s => s.id === id);
  if(!skill) return;
  if((G.eng_skills||[]).includes(id)) { addLog("Already know this tool", "info"); return; }
  if(G.bank < 500) { addLog("Need $500 for courses/software license", "bad"); closeModal(); render(); return; }
  if(G.smarts < 30) { addLog("Need smarts 30+ to learn engineering tools", "bad"); return; }
  G.bank -= 500;
  G.smarts = clamp(G.smarts - rand(0,2), 1, 100); // mental effort
  if(!G.eng_skills) G.eng_skills = [];
  G.eng_skills.push(id);
  // Immediately update salary if employed
  if(G.eng_firm) {
    const newBoost = calcEngSkillSalaryBoost();
    G.salary = Math.round(G.eng_base_salary * (1 + newBoost));
  }
  addLog(`🖥️ Learned ${skill.label}! Salary +${Math.round(skill.salaryBoost*100)}%, access +${skill.accessBoost} pts`, "good");
  _engLearnSkillsModal(!!G.eng_firm);
}

// Engineering in-role actions
function engWorkProject() {
  const perfGain = rand(5, 14);
  G.job_performance = clamp(G.job_performance + perfGain, 0, 100);
  G.eng_projects_completed = (G.eng_projects_completed || 0) + 1;
  G.health = clamp(G.health - rand(1, 4), 1, 100);
  const bonus = G.job_performance >= 75 ? rand(2000, 8000) : 0;
  if(bonus > 0) G.bank += bonus;
  addLog(`📐 Completed a major project. Performance +${perfGain}${bonus > 0 ? `, Project bonus: ${fmt$(bonus)}` : ''}`, "good");
  closeModal(); render();
}

function engPursueAdvanced() {
  const certs = ENG_SKILLS.filter(s => s.category === 'Management' && !(G.eng_skills||[]).includes(s.id));
  if(certs.length === 0) {
    addLog("Already hold all available certifications!", "good");
    closeModal(); render(); return;
  }
  let html = `<h2>🎓 Advanced Certifications</h2>
    <div class="modal-sub">High-value credentials that unlock senior roles</div>
    <div id="modal-options">`;
  certs.forEach(cert => {
    const cost = cert.id === 'pe_license' ? 2000 : cert.id === 'pmp' ? 800 : 600;
    html += `<button class="modal-opt" onclick="engGetCert('${cert.id}',${cost})">
      <span class="opt-icon">${cert.emoji}</span>
      <div>
        <div class="opt-label">${cert.label}</div>
        <div class="opt-desc">${cert.desc}<br>Cost: ${fmt$(cost)} · +${Math.round(cert.salaryBoost*100)}% salary · +${cert.accessBoost} access pts</div>
      </div>
    </button>`;
  });
  html += `</div>`;
  openModal(html);
}

function engGetCert(id, cost) {
  const cert = ENG_SKILLS.find(s => s.id === id);
  if(!cert) return;
  if(G.bank < cost) { addLog(`Need ${fmt$(cost)} for ${cert.label}`, "bad"); closeModal(); render(); return; }
  G.bank -= cost;
  if(!G.eng_skills) G.eng_skills = [];
  G.eng_skills.push(id);
  if(id === 'pe_license') G.eng_pe_license = true;
  const newBoost = calcEngSkillSalaryBoost();
  if(G.eng_firm) G.salary = Math.round(G.eng_base_salary * (1 + newBoost));
  addLog(`🎓 Earned ${cert.label}! Salary now +${Math.round(newBoost*100)}% above base`, "special");
  closeModal(); render();
}

function engNegotiateSalary() {
  if(G.job_performance >= 65) {
    const skillBoost = calcEngSkillSalaryBoost();
    const raise = Math.round(G.eng_base_salary * randF(0.04, 0.12));
    G.eng_base_salary += raise;
    G.salary = Math.round(G.eng_base_salary * (1 + skillBoost));
    addLog(`💵 Negotiated raise: +${fmt$(raise)}/yr base → total ${fmt$(G.salary)}/yr`, "money");
  } else {
    addLog(`❌ Raise denied. Performance ${G.job_performance}/100 — need 65+`, "bad");
  }
  closeModal(); render();
}

function engChangeFirm() {
  G.eng_firm = null; G.eng_sector = null; G.eng_level = 0; G.eng_base_salary = 0;
  G.job = null; G.salary = 0;
  addLog("Resigned from engineering firm — searching for new opportunities", "info");
  showEngineering();
}

function quitEngineering() {
  addLog(`🚪 Left ${G.eng_firm}`, "info");
  G.eng_firm = null; G.eng_sector = null; G.eng_level = 0; G.eng_base_salary = 0;
  G.job = null; G.salary = 0;
  G.happiness = clamp(G.happiness - 5, 5, 100);
  closeModal(); render();
}

function calcAcadSkillSalaryBoost() {
  const skills = G.acad_skills || [];
  return skills.reduce((sum, id) => {
    const s = ACAD_SKILLS.find(x => x.id === id);
    return sum + (s ? s.salaryBoost : 0);
  }, 0);
}

function calcAcadSkillAccessScore() {
  const skills = G.acad_skills || [];
  return skills.reduce((sum, id) => {
    const s = ACAD_SKILLS.find(x => x.id === id);
    return sum + (s ? s.accessBoost : 0);
  }, 0);
}

function acadPrestigeTierLabel(p) {
  if(p >= 80) return { label:'Elite Research Pedigree', color:'var(--yellow)' };
  if(p >= 65) return { label:'Strong Research Pedigree', color:'var(--accent2)' };
  if(p >= 48) return { label:'Solid Academic Pedigree', color:'var(--accent)' };
  if(p >= 30) return { label:'Regional Pedigree', color:'var(--muted)' };
  return { label:'Limited Academic Pedigree', color:'var(--red)' };
}

// Research renown score — drives tenure quality, hiring, and Nobel eligibility
function acadRenownScore() {
  const papers = G.acad_papers_published || 0;
  const citations = G.acad_citations || 0;
  return Math.round(papers * 4 + citations / 25);
}

function showAcademia() {
  const prestige   = getPrestigeScore();
  const skillScore = calcAcadSkillAccessScore();
  const salaryBoost= calcAcadSkillSalaryBoost();
  const tier       = acadPrestigeTierLabel(prestige);
  const inAcad     = !!G.acad_firm;
  const renown     = acadRenownScore();

  let html = `<h2>🎓 Academia Career</h2>`;

  // Profile card
  html += `<div class="result-card" style="border-left-color:${tier.color}">
    <div class="rc-title">Academic Profile</div>
    <div class="rc-body">
      Prestige (school pedigree): <b style="color:${tier.color}">${prestige}/100 — ${tier.label}</b><br>
      Research skill score: <b style="color:var(--green)">${skillScore} pts</b> (${(G.acad_skills||[]).length} methods mastered)<br>
      Skill salary bonus: <b style="color:var(--yellow)">+${Math.round(salaryBoost*100)}%</b><br>
      Papers published: <b>${G.acad_papers_published||0}</b> · Citations: <b>${G.acad_citations||0}</b> · Renown: <b style="color:var(--accent2)">${renown} pts</b>

    const sector = ACAD_SECTORS[G.acad_field];

    html += `<div class="result-card good">
      <div class="rc-title">🎓 ${G.acad_firm}</div>
      <div class="rc-body">
        ${level.title}${sector ? ' · ' + sector.label : ''}${G.acad_discipline ? ' · ' + G.acad_discipline : ''}<br>
        Base: ${fmt$(G.acad_base_salary)}/yr · Total w/skills: ${fmt$(G.salary)}/yr<br>
        Performance: ${G.job_performance}/100 · ${G.acad_tenured ? '<span style="color:var(--green)">Tenured</span>' : 'Pre-tenure'}
      </div>
    </div>`;
    html += `<div id="modal-options">
      <button class="modal-opt" onclick="acadLearnSkills()"><span class="opt-icon">🧪</span><div><div class="opt-label">Learn Research Methods</div><div class="opt-desc">${(G.acad_skills||[]).length} methods learned — each boosts salary 5–12%</div></div></button>
      <button class="modal-opt" onclick="acadDoResearch()"><span class="opt-icon">📝</span><div><div class="opt-label">Conduct Research & Publish</div><div class="opt-desc">+performance, papers & citations toward renown</div></div></button>
      <button class="modal-opt" onclick="acadPursueAdvanced()"><span class="opt-icon">🏅</span><div><div class="opt-label">Pursue Grants & Credentials</div><div class="opt-desc">Fellowships, editorial boards, dept leadership</div></div></button>
      <button class="modal-opt" onclick="acadNegotiateSalary()"><span class="opt-icon">💵</span><div><div class="opt-label">Negotiate Salary</div><div class="opt-desc">Use your record & performance to negotiate up</div></div></button>
      ${nobelEligible ? `<button class="modal-opt" ${(G.acad_level||0) < 2 ? 'style="opacity:0.4" disabled' : ''} onclick="${(G.acad_level||0) < 2 ? '' : 'acadPursueNobel()'}"><span class="opt-icon">🏅</span><div><div class="opt-label">Pursue a Nobel Prize</div><div class="opt-desc">${(G.acad_level||0) < 2 ? 'Reach Full Professor first' : `Renown ${renown} pts · long-shot recognition in ${sector.nobelCategories.join(' or ')}`}</div></div></button>` : `<button class="modal-opt" style="opacity:0.4" disabled><span class="opt-icon">🏅</span><div><div class="opt-label">Pursue a Nobel Prize</div><div class="opt-desc">No Nobel category exists for this field</div></div></button>`}
      <button class="modal-opt" onclick="acadChangeFirm()"><span class="opt-icon">🔀</span><div><div class="opt-label">Switch Institution / Field</div><div class="opt-desc">Move on to a new department</div></div></button>
      <button class="modal-opt" onclick="quitAcademia()"><span class="opt-icon">🚪</span><div><div class="opt-label">Leave Academia</div><div class="opt-desc">Exit to industry, consulting, or elsewhere</div></div></button>
    </div>`;
  } else {

    const sectors = Object.keys(ACAD_SECTORS);

    sectors.forEach(key => {
      const sector = ACAD_SECTORS[key];
      const accessible = sector.firms.filter(f => prestige >= f.minPrestige && skillScore >= f.minSkillScore);
      const minPres = Math.min(...sector.firms.map(f => f.minPrestige));
      const minSkill = Math.min(...sector.firms.map(f => f.minSkillScore));

      html += `<button class="modal-opt" ${noAccess ? 'style="opacity:0.4" disabled' : ''} onclick="${noAccess ? '' : `acadSelectField('${key}')`}">

        <div>
          <div class="opt-label">${sector.label}${sector.nobelCategories.length ? ' 🏅' : ''}</div>
          <div class="opt-desc">${noAccess
            ? `Need prestige ${minPres}+ and skill score ${minSkill}+`
            : `${accessible.length}/${sector.firms.length} institutions accessible · Top: ${accessible[0]?.name}`
          }</div>
        </div>
      </button>`;
    });
    html += `</div>`;
    html += `<button class="modal-btn secondary" style="margin-top:10px" onclick="acadLearnSkillsStandalone()">🧪 Learn Research Methods First</button>`;
